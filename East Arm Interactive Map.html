});

// ═══════════════════════════════════════════════
// RENDER CAMPSITES (with selection support)
// ═══════════════════════════════════════════════

// Load selected campsites from localStorage
let selectedCamps = JSON.parse(localStorage.getItem('selectedCamps') || '[]');

function makeCampIcon(isSelected) {
  const color = isSelected ? '#66bb6a' : '#e85d26';
  const shadow = isSelected ? 'rgba(102,187,106,0.7)' : 'rgba(232,93,38,0.6)';
  const size = isSelected ? 16 : 12;
  return L.divIcon({
    className: '',
    html: `<div style="background:${color};border:2px solid #fff;border-radius:50%;width:${size}px;height:${size}px;box-shadow:0 0 8px ${shadow};transition:all 0.3s;"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

// Store marker references for updates
const campMarkers = {};

campsites.forEach(c => {
  const isSelected = selectedCamps.includes(c.id);
  const marker = L.marker([c.lat, c.lng], { icon: makeCampIcon(isSelected) }).addTo(map);
  campMarkers[c.id] = marker;

  marker.bindTooltip(`${isSelected ? '\u2705 ' : ''}${c.id} ${c.name}`, {
    direction: 'top',
    offset: [0, -8],
    className: 'camp-tooltip'
  });

  marker.on('click', () => openCampsitePanel(c));
});

// ═══════════════════════════════════════════════
// CAMPSITE DETAIL PANEL (with stay/remove button)
// ═══════════════════════════════════════════════

let currentPanelCampId = null;

function openCampsitePanel(c) {
  currentPanelCampId = c.id;
  const ch = chapters.find(ch => ch.num === c.ch);
  const sel = selectedCamps.includes(c.id);
  const body = `
    <div class="camp-card" style="border-color:${sel ? '#66bb6a' : '#e85d26'};">
      ${sel ? '<span style="color:#66bb6a;font-size:0.8rem;font-weight:bold;">STAYING HERE</span>' : ''}
      <h4>${c.id} — ${c.name}</h4>
      ${c.tags.map(t => campTag(t)).join('')}
      <p>${c.desc}</p>
      <p style="font-size:0.8rem;color:#667;margin-top:8px;">
        Coordinates: ${c.lat.toFixed(4)}°N, ${Math.abs(c.lng).toFixed(4)}°W
      </p>
      <button class="stay-btn ${sel ? 'stay-btn-remove' : 'stay-btn-add'}" onclick="toggleCampFromPanel('${c.id}')">
        ${sel ? 'Remove from Our Campsites' : 'Add to Our Campsites'}
      </button>
    </div>

    <h3>Area Context: Ch. ${ch.num}</h3>
    <p>${diffBadge(ch.difficulty)}</p>
    <p style="font-size:0.9rem;">${ch.summary.substring(0, 250)}...</p>

    <div class="link-section">
      <a class="detail-toggle" data-target="camp-${c.id}-photos" data-label="Area Photos">Area Photos</a>
      <a class="detail-toggle" data-target="camp-${c.id}-hist" data-label="Area History & Science">Area History & Science</a>
      <a class="detail-toggle" data-target="camp-${c.id}-danger" data-label="Area Dangers">Area Dangers</a>
    </div>

    <div class="detail-content" id="camp-${c.id}-photos">
      <h3>Photos from this Area</h3>
      ${getPhotoGridHTML(ch.num)}
    </div>

    <div class="detail-content" id="camp-${c.id}-hist">
      <h3>History</h3>
      ${ch.history}
      <h3>Natural History</h3>
      ${ch.naturalHistory}
    </div>

    <div class="detail-content" id="camp-${c.id}-danger">
      <h3>Dangers & Challenges</h3>
      ${ch.dangers}
    </div>
  `;
  openPanel(`Campsite ${c.id}: ${c.name}`, `Chapter ${ch.num} — ${ch.name}`, body);
}

function toggleCampFromPanel(id) {
  toggleCampSelection(id);
  // Re-render the panel so the button updates
  const c = campsites.find(camp => camp.id === id);
  if (c) openCampsitePanel(c);
}

// ═══════════════════════════════════════════════
// TRIP PLANNER — Campsite selection panel
// ═══════════════════════════════════════════════

function toggleCampSelection(id) {
  const idx = selectedCamps.indexOf(id);
  if (idx >= 0) {
    selectedCamps.splice(idx, 1);
  } else {
    selectedCamps.push(id);
  }
  localStorage.setItem('selectedCamps', JSON.stringify(selectedCamps));

  // Update marker
  const isSelected = selectedCamps.includes(id);
  const marker = campMarkers[id];
  if (marker) {
    marker.setIcon(makeCampIcon(isSelected));
    const c = campsites.find(camp => camp.id === id);
    marker.unbindTooltip();
    marker.bindTooltip(`${isSelected ? '\u2705 ' : ''}${c.id} ${c.name}`, {
      direction: 'top',
      offset: [0, -8],
      className: 'camp-tooltip'
    });
  }

  // Update planner item styling
  const item = document.querySelector(`.planner-item[data-id="${id}"]`);
  if (item) {
    item.classList.toggle('selected', isSelected);
  }

  updatePlannerCount();
}

function updatePlannerCount() {
  const badge = document.getElementById('planner-count-badge');
  if (selectedCamps.length > 0) {
    badge.innerHTML = `<span class="planner-count">${selectedCamps.length} night${selectedCamps.length === 1 ? '' : 's'}</span>`;
  } else {
    badge.textContent = '';
  }
}

function buildPlannerList() {
  const body = document.getElementById('planner-body');
  let html = '';

  // Group campsites by chapter
  const grouped = {};
  campsites.forEach(c => {
    if (!grouped[c.ch]) grouped[c.ch] = [];
    grouped[c.ch].push(c);
  });

  Object.keys(grouped).sort((a, b) => a - b).forEach(chNum => {
    const ch = chapters.find(ch => ch.num === parseInt(chNum));
    html += `<div class="planner-chapter">`;
    html += `<div class="planner-chapter-title">Ch ${ch.num} — ${ch.name}</div>`;

    grouped[chNum].forEach(c => {
      const isSelected = selectedCamps.includes(c.id);
      html += `
        <label class="planner-item ${isSelected ? 'selected' : ''}" data-id="${c.id}">
          <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleCampSelection('${c.id}')">
          <div class="planner-item-label">
            <div class="planner-item-name">${c.name}</div>
            <div class="planner-item-id">${c.id} &middot; ${c.tags.join(', ') || 'Campsite'}</div>
          </div>
        </label>
      `;
    });

    html += `</div>`;
  });

  body.innerHTML = html;
  updatePlannerCount();
}

function togglePlanner() {
  const planner = document.getElementById('planner');
  const isOpen = planner.classList.contains('open');
  if (isOpen) {
    planner.classList.remove('open');
  } else {
    buildPlannerList();
    planner.classList.add('open');
    closePanel(); // close the right panel if open
  }
}

// ═══════════════════════════════════════════════
// SHARE / LOAD selections
// ═══════════════════════════════════════════════

function encodeSelections() {
  return selectedCamps.slice().sort().join(',');
}

function applySelections(ids) {
  // Clear current
  selectedCamps.forEach(id => {
    const marker = campMarkers[id];
    if (marker) {
      marker.setIcon(makeCampIcon(false));
      const c = campsites.find(camp => camp.id === id);
      marker.unbindTooltip();
      marker.bindTooltip(`${c.id} ${c.name}`, { direction: 'top', offset: [0, -8], className: 'camp-tooltip' });
    }
  });
  // Set new
  selectedCamps.length = 0;
  ids.forEach(id => {
    if (campsites.find(c => c.id === id)) {
      selectedCamps.push(id);
    }
  });
  localStorage.setItem('selectedCamps', JSON.stringify(selectedCamps));
  // Update all markers
  selectedCamps.forEach(id => {
    const marker = campMarkers[id];
    if (marker) {
      marker.setIcon(makeCampIcon(true));
      const c = campsites.find(camp => camp.id === id);
      marker.unbindTooltip();
      marker.bindTooltip(`\u2705 ${c.id} ${c.name}`, { direction: 'top', offset: [0, -8], className: 'camp-tooltip' });
    }
  });
  updatePlannerCount();
  buildPlannerList();
}

function showToast(msg, color) {
  const toast = document.getElementById('share-toast');
  toast.style.color = color || '#66bb6a';
  toast.textContent = msg;
  setTimeout(() => { toast.textContent = ''; }, 3000);
}

function copyShareCode() {
  if (selectedCamps.length === 0) {
    showToast('No campsites selected yet!', '#f0c040');
    return;
  }
  const code = encodeSelections();
  navigator.clipboard.writeText(code).then(() => {
    showToast('Copied! Send this to your group.');
  }).catch(() => {
    // Fallback: select an input
    const input = document.getElementById('share-input');
    input.value = code;
    input.select();
    showToast('Code shown above — copy it manually.');
  });
}

function loadShareCode() {
  const input = document.getElementById('share-input');
  const code = input.value.trim();
  if (!code) {
    showToast('Paste a share code first!', '#f0c040');
    return;
  }
  const ids = code.split(',').map(s => s.trim()).filter(Boolean);
  const valid = ids.filter(id => campsites.find(c => c.id === id));
  if (valid.length === 0) {
    showToast('No valid campsites found in that code.', '#ef5350');
    return;
  }
  applySelections(valid);
  input.value = '';
  showToast(`Loaded ${valid.length} campsite${valid.length === 1 ? '' : 's'}!`);
}

// On page load, check URL hash for shared selections
(function() {
  const hash = window.location.hash.slice(1);
  if (hash && hash.startsWith('camps=')) {
    const ids = decodeURIComponent(hash.replace('camps=', '')).split(',').map(s => s.trim()).filter(Boolean);
    const valid = ids.filter(id => campsites.find(c => c.id === id));
    if (valid.length > 0) {
      applySelections(valid);
    }
  }
})();

}

function getPhotoGridHTML(chNum) {
  const photos = chapterPhotos[chNum];
  if (!photos || photos.length === 0) return '<p style="color:#667;">No photos available.</p>';
  const basePath = 'chapter_photos_web/';
  return '<div class="panel-photo-grid">' +
    photos.map(p => {
      const src = basePath + p.file;
      const safeCap = p.caption.replace(/'/g, "\\'");
      return '<div class="panel-photo-card" onclick="openLightbox(\'' + src + '\',\'' + safeCap + '\')">' +
        '<img src="' + src + '" alt="' + p.caption.replace(/"/g, '&quot;') + '" loading="lazy">' +
        '<div class="photo-cap">' + p.caption + '</div></div>';
    }).join('') +
    '</div><p style="font-size:0.72rem;color:#556;margin-top:8px;font-style:italic;">Photos by David Bahr — click to enlarge</p>';
}
