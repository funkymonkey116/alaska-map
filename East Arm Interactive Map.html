  coords: [[58.960,-136.095],[58.970,-136.105],[58.978,-136.095],[58.985,-136.102],[58.995,-136.110],[59.008,-136.118],[59.020,-136.125],[59.020,-136.155],[59.005,-136.152],[58.990,-136.148],[58.975,-136.145],[58.960,-136.138]],
  distance: '4 nmi (4.5 mi, 7.5 km)',
  traverse: '1 hour 30 minutes',
  hiking: 'Relationship destroying — don\'t bother except along beaches',
  summary: `Few people camp along this peaceful, short, and relaxing stretch, especially compared to the always-humming entrance to McBride Inlet just north. Most kayakers come to Glacier Bay for massive blue glaciers and camping here feels like defeat -- so close but so far from the irresistible ice. Still, on a good day, a steady stream of icebergs float by camp, sometimes crunching, grinding, and grounding overnight on the shores -- a pretty cool way to wake up. After the comparative flats of Forest Creek, the views north toward Riggs Glacier and nearby peaks come as a surprise. Peaks loom much larger, the fjord narrows noticeably, cliffs come to the water's edge, and the combined effect practically pulls you northward with the promise of bigger spectacles to come. If time is not of the essence, stay the night and appreciate this much quieter strip where the campsites are not earth-shattering but the solitude definitely is.`,
  history: `<p><strong>Huna Tlingit sealing:</strong> Bill Field found a Tlingit seal hunting blind on Sealers Island in 1926, prompting the name. The Huna Tlingit called it Aan Adeli -- Village Watchman. From Elsie Greenwald, 1946: "Glacier Bay is the best. It was called the cold storage and the source of food for the Hunas." Mrs. Houston, Mrs. Williams, and Mrs. Lawrence: "All of Glacier Bay was kind of a storehouse for the people of the Hoonah."</p>
<p><strong>ANCSA (1971):</strong> Final settlement paid $3 per acre -- $250 million total for Southeast Alaska Tlingit and Haida. The ambiguously worded treaty did not explicitly protect subsistence hunting on public lands. The 1972 Marine Mammal Protection Act prompted the park to enforce a hunting ban. The 1980 ANILCA restored many subsistence activities but not hunting within the bay. Recently, gull egg harvesting permits have been issued.</p>
<p><strong>Tlingit breadbasket names:</strong> K'wat Aani (Egg Land) for rocky islands; Tleikhw Aani (Berry Land) in Dundas Bay; Gaatheni (Salmon River, now the Bartlett River).</p>`,
  naturalHistory: `<p><strong>Nunataks:</strong> Rock islands in a sea of ice that act as wildlife refuges and plant arks. Until 1929, the Muir Glacier completely encircled The Nunatak. About 145 million tons of molybdenum ore lurk underneath, first discovered in 1941. Striations indicate ice flow directions; cosmic ray alteration dates the glacier's departure; lichen size gives a rough date of retreat.</p>
<p><strong>Island biogeography:</strong> Large nunataks act as wildlife refuges and plant islands. When ice retreats, these refuges repopulate surrounding terrain -- critical for understanding climate change effects on mountain goats and other species pushed to "climate islands."</p>
<p><strong>Weather stations:</strong> Two research weather stations sit in The Nunatak area. Check conditions at the University of Utah MesoWest website (RAWS network).</p>`,
  dangers: `<p><strong>Bears at Nunatak Cove:</strong> In 2008, a bear destroyed a kayak and gear after campers discovered too late they'd set up near a stashed moose carcass. From the park press release: "The campers attempted to deter the bear with bear pepper spray but were not able to contact the bear directly. The campers eventually left the shore in one kayak while the bear destroyed the other kayak and much of their gear."</p>
<p><strong>Nunatak Cove mud trap:</strong> At low tides, this silt-choked cove empties completely, trapping you in camp or forcing a horrible suck-muck portage to the mouth.</p>
<p><strong>Sealers Island closure:</strong> Off-limits May 1 to August 31 for ground-nesting birds. With ever-decreasing icebergs, Glacier Bay has a declining harbor seal population. Illegal camping on closed islands is one of the park's biggest headaches; federal penalties apply.</p>
<p><strong>Salt chuck water warning:</strong> Avoid drinking from a small stream just south of McBride Inlet -- the water comes from a salt chuck that floods at high tide.</p>
<p><strong>Westdahl Point shallowing:</strong> Note the underwater extension on nautical charts. Forced to climb over this rise, the water can get a tiny bit rougher at peak ebb and flood -- just enough to notice but rarely problematic. Beginners might wait for slack tide.</p>`
},

  id: 'ch26',
  num: 26,
  name: 'McBride Inlet — The Swirling Vortex of Doom',
  difficulty: 'Variable',
  center: [dms(59,2,0), -dms(136,8,45)],
  coords: [[59.018,-136.122],[59.028,-136.108],[59.038,-136.105],[59.048,-136.120],[59.056,-136.142],[59.062,-136.165],[59.065,-136.185],[59.060,-136.198],[59.052,-136.180],[59.044,-136.160],[59.035,-136.145],[59.025,-136.145],[59.020,-136.148]],
  distance: '2 nmi outside; 4 nmi inside the inlet',
  traverse: '1 hour outside; 2.5 hours end to end inside',
  hiking: 'Relationship destroying — hardcore hikers can try for a ridgeline',
  summary: `The last remaining tidewater glacier of the East Arm, the McBride Glacier feeds a shockingly narrow "canal" that jostles and bucks ice like an interstate pile-up of epic proportions. The glacier crouches out of sight, invisible from the inlet's entrance, which sometimes surprises repeat visitors who remember the early 2000s when the massive face calved deafening bergs and spawned huge waves onto the terminal moraine. The McBride has withdrawn from public life, retreating around a distant bend accessible only by a harrowing paddle best avoided by all but the most experienced paddlers.

<p>Even without the glacier in view, McBride Inlet remains glorious -- big mountains above and a concussion of blue crunching icebergs self-destructing below. At peak ebb, icy behemoths scream past the shoreline at 10 knots, practically whooshing your hair. At low tide, hundreds of icebergs and bergy bits strand themselves like beached whales on the shore -- perfect for poking, prodding, and selfies. You can gaze into deep sapphire blues, slippery silvers, and puffy white creams shaped like bananas, bicycles, puppies, and monolithic presidents etched into temporary Mt. Rushmores.</p>

<p>The inlet's on-the-nose nickname -- "The Swirling Vortex of Death" or "The Swirling Vortex of Doom" -- betrays its devastating truth. Boating through the entrance is an expert's game of pinball with kayak-crushing icebergs and kayak-crumpling shoreline rocks. Extraordinarily strong currents make a dangerous counter-clockwise swirl into a well-hidden shoal. Park rangers once flipped their double kayak here, clung onto an iceberg, and were rescued by quick-thinking campers who heard weak calls for help over the crushing and gnashing ice. The Park Service forbids VIS employees from paddling into McBride Inlet, and Glacier Bay Sea Kayaks forbids their rental customers from entering.</p>

<p>Smarter kayakers spend an entire tide cycle studying the waters from shore. Slack water is key, and because of the channel constriction, it sometimes arrives two hours late. For lesser mortals, a portage is possible: the south side has a rough unmaintained "trail" supposedly bulldozed by hopeful miners -- follow the beach east at low tide, look for the cut just right of a rocky alder-covered knob, endure some tree bashing, and emerge onto a spectacular fireweed-backed sand and rock beach. Put in and hug the south shoreline at slack tide.</p>

<p>The McBride Glacier retreats at about 0.2 miles per year and is scheming its final withdrawal from the water. Its calving output is already sputtering with periods of long quiescence as the terminus hovers at the grounding line. In 2017 during a midsummer calving hiatus, confused harbor seals scrambled onto the last remnants of ice. In 2019, the author could not find a single seal and saw only a few tiny remnants of ice. A park wildlife biologist found only a few seals on a single iceberg that year. The calving restarted in 2020, but it will be a short reprieve for seals who need icebergs to haul out and give birth. When the glacier inevitably retreats onto land, the entrance will become much safer -- probably appropriate for intermediates at slack tide, maybe even beginners.</p>

<p>The camping is pleasant and views up the inlet will always be dramatic with or without icebergs. This is the best semi-adjacent camp for visiting nearby Riggs Glacier -- well worth two nights with a quick excursion and picnic at the Riggs on the layover day. This is one of the busier zones in the park, heavily used by guided tours.</p>`,
  history: `<p><strong>Cairns and little more:</strong> Prospectors and surveyors scrambled over this terrain and left cairns and a few prospecting pits, but the inlet has been ice-free for only a few decades. The south side has a rough trail supposedly bulldozed through rock by hopeful miners.</p>

<p><strong>McConnell Ridge:</strong> Named for a geologist and surveyor who visited Muir Inlet in 1913. McConnell worked for the same Canadian Geological Survey that employed Klotz (see the Forest Creek Flats and Klotz Hills chapter). Both helped establish the once nebulous and highly contentious US-Canadian boundary throughout this region.</p>

<p><strong>A weird wilderness migration:</strong> Ignore the latest 2019 Trails Illustrated wilderness boundary marked across McBride Inlet -- the entire inlet is open to motorized vessels. As the glacier retreats, the wilderness boundary moves backwards with the ice, following the legal description in ANILCA which says the wilderness follows the coastline. When the glacier finally recedes onto land, the boundary will affix permanently onto the new shoreline. This curious situation puzzled Park Service employees across multiple offices and cities. Glacier Bay currently manages the waters as a de facto "motorized wilderness." Heavy sedimentation and steady isostatic uplift could eventually turn the inlet into an outwash plain with mudflats, a freshwater lake, and a short river draining into Muir Inlet. Given enough time, the shallow McBride Inlet might eventually clog shut, rise upward, and turn into wilderness land once more.</p>

<p><strong>Camper impacts:</strong> The north and south sides of the moraine are two of the busiest campsites in the park, and abuses have become painfully apparent. An irate Assistant US Attorney on vacation took photos of an unattended open bear canister at McBride so the park could press federal charges. "A fed bear is a dead bear" -- once they get a taste for high-calorie human food, they keep coming back until "destruction" becomes necessary.</p>`,
  naturalHistory: `<p><strong>The retreat -- Muir and McBride part ways:</strong> The Muir and McBride Glaciers parted ways in 1945 or 1946. While the Muir marched quickly backwards to the end of Upper Muir Inlet, the McBride refused to budge for almost twenty years. Until the late 1960s, the stubborn behemoth hovered at the edge of Muir Inlet, slowly building and reinforcing the terminal moraine that bolstered its ice and helped keep it anchored. Eventually, an unknown event -- earthquake, large calving, or otherwise -- knocked it backwards off the protective moraine and into deeper water. Calving rates are proportional to water depth, so the deeper water behind the moraine fueled the glacier's slow but steady retreat through the 1970s.</p>

<p><strong>Earthquake-triggered calving:</strong> On June 4, 2014, a magnitude 5.7 earthquake centered near Rendu Inlet (West Arm) shook the McBride so hard that the terminus calved ice for almost 15 minutes straight, according to rangers camped nearby. This is a modern example of the massive calving that geologists believe triggered the rapid retreat of the Muir Glacier in 1899.</p>

<p><strong>Extreme marine sediments:</strong> The McBride's glacier flour -- pulverized rock ground into ultra-fine sediment -- flushes out via an impressively large high-pressure subglacial stream, like an underwater fire hose. In 1987, scientists measured 43 feet per year of mud accumulating on the inlet floor during peak midsummer runoff, and up to 66 feet per year near the glacier. The rate is so high that the once rough seafloor is now baby-bottom smooth, marked only by furrows from big, bottom-dragging icebergs.</p>

<p><strong>Iceberg marks in the mud:</strong> At low tide, look for drag marks ("tool marks") in the mud along the shores -- you can trace many right back to the guilty iceberg. Also look for round "bounce marks" (brief contact), stuttering chatter marks (multiple contacts), depressions from the weight of grounded bergs now gone, and occasional roll marks. What you see on the beach mirrors the otherwise smooth bottom of the inlet.</p>

<p><strong>Harbor seals in crisis:</strong> With fewer icebergs, harbor seals have nowhere to haul out and birth pups. In 2017, confused seals scrambled onto the last remnants of ice. By 2019, almost no seals or ice were found -- a park wildlife biologist located only a few seals on a single iceberg. The calving restarted in 2020 but is only a short reprieve. More frequent motorized access compounds the problem -- a double whammy for boat-averse seals who rely on icebergs to protect their young from predators.</p>

<p><strong>Local interstadial wood:</strong> Ancient interstadial trees are easy to find on the north side. Follow the beach a half mile back and look for a big three-foot-tall stump at the thicket edge -- a well-aged, two-and-a-half-foot diameter monster dating to well before the Little Ice Age when the McBride overran the area's forests. Smaller interstadial trees stick horizontally out of loose glacier deposits about 50 feet above the inlet on the north side, easy to spot with binoculars. Eagle-eyed observers will also spot a 15-foot-tall, three-foot-diameter stump high above the southern shores in alluvial debris. Many of these interstadial trees are around 2,000 years old, but some are a whopping 7,200 to 7,500 years old.</p>

<p><strong>Sensitive nesting birds:</strong> Watch for ground-nesting birds at the entrance, especially on the north side of the moraine which is an official "area of concern." Arctic terns, semipalmated plovers, short-billed gulls, and black oystercatchers nest here regularly, although high numbers of campers drive away most of the terns. Oystercatchers return every year and will charge if you approach their nest, performing the "I-have-a-broken-wing ploy" to lead you away. In 2019 on the south side, the author found a sad abandoned nest with two squished eggs and boot prints leading straight through.</p>`,
  dangers: `<p><strong>THE SWIRLING VORTEX OF DOOM:</strong> Strong currents and eddies outside the narrow entrance can spin, flip, and ensnare novice kayakers. A dangerous counter-clockwise swirl feeds into a well-hidden shoal. Park rangers flipped their double kayak here, clung to an iceberg, and were rescued by quick-thinking campers. The Park Service forbids VIS employees from paddling in, and Glacier Bay Sea Kayaks forbids their rental customers from entering. At peak ebb and especially peak flood, beginners should give the narrow mouth a very wide berth. Even advanced paddlers should beware the crush of icebergs, hidden shoals, and eddies inside the inlet. Big icebergs routinely roll -- an additional hazard in the close quarters of an icy jam-packed inlet.</p>

<p><strong>Timing and tactics:</strong> Smarter kayakers spend an entire tide cycle studying the waters from shore. Slack water is key -- because of channel constriction, it sometimes arrives two hours late. Wear a dry suit. Look left and right for icebergs. When the McBride inevitably retreats onto land and ceases calving, the entrance will become much safer -- probably appropriate for intermediates with pushy current experience, maybe even beginners at slack tide.</p>

<p><strong>Portage options:</strong> The south side has a rough unmaintained "trail" supposedly bulldozed through rock by hopeful miners. Follow the beach east at low tide to a small rocky area covered in alders, look for the cut just right of the rocky knob. Expect tree bashing and alder bruises, but a spectacular fireweed-backed beach is accessible on the far side. Put in and hug the south shoreline at slack tide -- which could mean waiting a few hours. A shorter portage on the north side, just past the initial rush of the entrance, is easier but still commits you to a ride in the counter-clockwise current across strong eddy lines. Alternatively, portage a full half nautical mile east of the entrance past the shoal entirely -- effective but a lot of work.</p>

<p><strong>Unsafe upper inlet:</strong> Until the glacier retreats above tidewater, mini tsunamis from calving make the end of the inlet near the snout dangerous. The adjacent slopes -- rapidly unweighted by retreating ice -- remain unstable, dropping rock bombs. Much of the shoreline in the upper inlet is unconsolidated debris with evidence of sudden downward subsidence and over-wash by calving-spawned waves. Landslides and large slumps are possible. In heavy rain, catastrophic and rapid erosion of the coastline and adjacent slopes is not just possible but probable. After calving stops and the land settles, this area will become substantially safer.</p>

<p><strong>Sensitive nesting birds:</strong> Watch for ground-nesting birds at the entrance, especially on the north side of the moraine (official "area of concern"). Arctic terns, semipalmated plovers, short-billed gulls, and black oystercatchers nest here. Oystercatchers use a broken-wing ploy to lead you from their nest -- humor them. Accidental egg stomping has been documented in official surveys and personally observed by the author.</p>

<p><strong>Camper impacts and bear safety:</strong> The moraine campsites are two of the busiest in the park with painfully apparent abuses. "A fed bear is a dead bear" -- once bears taste high-calorie human food, they keep coming back until "destruction" becomes necessary. Minimize impacts and clean up after others. An irate Assistant US Attorney on vacation photographed an unattended open bear canister so the park could press federal charges.</p>`
},

  summary: `The ultimate East Arm destination -- a beautiful, blue, user-friendly glacier tucked under quintessential high crumbling peaks that light up red with alpenglow in the evenings. Although no longer calving, the Riggs remains the most accessible ice in Muir Inlet, and for many folks, this will be the only glacier experienced up close and personal; the rest have receded too far inland.

<p>Park your kayak on the northwest shore, just before the start of the mudflats so you won't get stuck by a receding tide. Pick your way east around or over the rough, steep slopes to the fascinating bedrock terrain in front of the rapidly receding glacier. Buried under ice only a few short years ago, this mostly barren hard-rock landscape hosts a fantasy series of small, large, and humongous waterfalls moving through deeply sculpted canyons -- some are ancient river channels that lived for centuries underneath the glacier, slowly carving through rock. Old streambeds, now abandoned, feel like Utah slickrock canyoneering; and others, still active and flowing, have a deep, dark, forbidding rush of power. Many smaller waterfalls hide in relatively narrow slots, invisible until peering over the canyon lip or wading upstream into the maw with tall insulated boots. "For my money this is one of the best hikes in the entire park and worthy of a long lingering afternoon."</p>

<p>With some minimal uphill effort above the waterfalls, the glacier is still accessible, though climate change is doing its utmost to place the ice far out of reach. The flatter parts of the ice will seduce you onto the glacier, overwhelming your soul with aquamarines and blues so pure they defy rational senses. But without crampons and an ice ax, it's significantly harder to climb back down. Before setting out, read John Muir's memoirs of near-fatal crevasse interactions -- his harrowing escape from the Brady Glacier in Stickeen and his crippling hypothermia after falling into the Muir Glacier.</p>

<p>Alternatively, wander along the uneven terminus and enjoy kettles, braided streams, mini-lakes, and other proglacial features. Kettles -- water-filled depressions formed when buried ice chunks melt -- come in all sizes from gigantic (Blackwater Pond in Bartlett Cove) to personal-sized "hot tubs" without the heat. Dry suits recommended for hypothermic selfies.</p>

<p>A fantastic but challenging 3.5-mile hike works east along the base of McConnell Ridge to a stunning overlook of the McBride Glacier. Expect uncooperative deep fast-flowing rivers and rough unstable rocks. A branch of the McBride Glacier used to flow down this valley and join the Riggs; it has long since retreated to the top of the pass, leaving uneven terrain hiding remnants of abandoned ice just below the surface rock. The only remaining "glacier" -- orphaned, dirty, and waiting to die -- sits at the top of the pass, no longer dynamically connected to either the Riggs or the McBride and too low to accumulate significant new snow. Unfortunately, a humongous impassable outlet river often blocks the first mile, forcing an evil alder-bashing bushwhack on McConnell Ridge's lower slopes.</p>

<p>Campsites near the Riggs underwhelm -- rocky, sloped, muddy, and uncomfortable. Many opt to stay in the McBride vicinity instead, making this a short day trip with pleasantly empty kayaks. There is no embayment in front of the Riggs Glacier, nor has there been for decades, despite claims by the latest 2019 Trails Illustrated, the 2023 Park Service map, and the 2024 NOAA ENC chart.</p>`,
  history: `<p><strong>Thomas Riggs Jr.:</strong> Appointed governor of the Territory of Alaska from 1918 to 1921 and a principal surveyor of the contentious Alaska-Canadian boundary, eventually promoted to Engineer-in-Charge and later Commissioner of the International Boundary Commission, which featured prominently in securing Glacier Bay's current international border. The Riggs breaks from Harry Fielding Reid's single-minded resolve to pepper all other East Arm glaciers with names of his students, colleagues, and friends, instead following another prominent Glacier Bay naming pattern -- geographic features named after surveyors and boundary commission members who stood upon them or vaguely near them or "briefly thought about them from a safe distance." Other examples include McConnell Ridge, Klotz Hills, Lars Island, Netland Island, Mount Watson, and boundary features such as Mount Root, Mount Forde, Mount Barnard, Mount Harris, and nearby Canadian features like the Ferris Glacier, Melbern Glacier, and Melbern Lakes.</p>

<p><strong>Black Mountain:</strong> Muir apparently named it in 1882 for its general appearance, according to his friend, Alaska explorer Marcus Baker. In Muir's day, a vast sea of ice surrounded all the peaks so that each appeared as a "black-pointed monolith floating on a froth of foamy white." But Muir was busy tending his California fruit orchard in 1882 and did not publish notable articles on Glacier Bay at that time. The name could easily have come from another source and first shows up on Cushing's 1891 map. Alaska has 12 official "Black Mountains," plus 18 more variants like Black Peak and Black Cap Mountain (above Tidal Inlet). With roughly 2,000 official USGS-named summits in Alaska, there's about a 2% chance someone will point at a mountain and say "Black something-or-another." Adding in Red Mountains (13, plus 14 variants), White Mountains (12), eight Greens, three Grays, one Purple, one Yellow, and one Blue (no Pinks, Chartreuse, or Puce), there's a roughly 4% chance -- one out of every 25 peaks -- that an Alaskan summit gets named after its color.</p>

<p><strong>Nonmotorized boundary:</strong> From June 1 to July 15, an imaginary extension of McConnell Ridge marks a barrier to motorized travel, keeping Upper Muir Inlet blessedly quiet. Cabin cruisers frequently approach right up to the legal limit, straining to see the Riggs and gnashing teeth in frustration. Pending future changes to federal regulations, the park plans to extend this closure from May 1 to July 15. The nonmotorized waters are an excellent reason to visit early in the season.</p>`,
  naturalHistory: `<p><strong>Glaciology 101 -- the bank account analogy:</strong> Glaciers behave like bank accounts (analogy from glaciologist Bob Sharp). Snow comes in every winter (paycheck), melts during summer (expenditures), and if temperatures aren't too warm, some snow survives all summer (savings): winter snowfall - summer snowmelt = snow saved. Unlike mere snow patches, glaciers hoard so much in their "nest egg" that the whole thing starts to ooze downhill under its own weight. That all-important flow defines a glacier -- if it doesn't move downhill, it's just snow or stagnant ice.</p>

<p><strong>Accumulation and ablation zones:</strong> The upper glacier is a thrifty accumulation zone; the lower glacier is a net-loss ablation zone. The accumulation zone transports savings downstream to resupply the spendthrift ablation zone -- that's the downhill movement. At high elevations, gravity squishes snow, pushing out all the air over many years until nothing remains but solid crystalline ice. Hundreds or thousands of feet thick, the deep ice bends and deforms under its own weight, oozing downhill like honey on an upturned plate (technically more like red-hot metal near its melting point). A healthy balanced glacier requires an accumulation zone covering just over half the surface -- precisely 57% accumulation and 43% ablation. In late August, glance at a small mountain glacier: if roughly half is still covered with fresh white snow, it's healthy; otherwise, "uh oh." This rule does not apply to currently calving glaciers (Lamplugh, Johns Hopkins, Margerie, McBride) but works well for land-terminating glaciers like the Riggs, Casement, and Carroll.</p>

<p><strong>Climate change and retreat:</strong> Climate change embezzles from the glacier's carefully balanced budget. With less snow up high and more melting down low, the glacier can't replenish its ablation zone, and the terminus retreats upward. The ice is always flowing downhill, relentlessly, but it melts too fast at low elevations to flow as far. Warming can generate slightly more snow (warm air holds more moisture), but that rarely compensates for increased melting losses.</p>

<p><strong>Crevasses explained:</strong> When a glacier tumbles over a steep section (an icefall), the stretching eventually exceeds the tensile (fracture) strength of the ice, forcing it to crack. Crevasses also form near glacier margins where ice gets stuck to the valley sidewall while the middle cruises along, creating incredible shear stresses like a deck of cards being smeared sideways. A secondary perpendicular set of cracks creates a checkerboard pattern of seracs -- tall isolated blocks that get transported downstream, sometimes crumbling into jagged blue spires. Crevasses are rare underneath a glacier because the immense pressure causes ice to flow more freely, closing any gaps. In a "super-fun physics twist," ice gets less stiff and more fluid with every foot of increasing depth. Crevasses typically last only a year or two -- they close as the ice moves to areas of changing stress, entombing rocks, trees, mountain goats, bears, people, even airplanes (all deformed into mangled bits). Well-preserved "icemen" found in glaciers were never in the heart of flowing ice -- rock alcoves protected them. If sleeping on a glacier with your ear pressed to bare ice, listen to the phenomenal snaps, booms, crackles, rumbles, and pops of ice fracturing.</p>
<p><strong>Glaciers on a slip-n-slide:</strong> Surface meltwater flows stronger during the day and weaker at night (diurnal variation reveals its source). Meltwater meanders along the ice surface until plummeting into a crevasse or a drainpipe-like hole called a moulin -- from inches to dozens of feet wide. These feed a devious, byzantine plumbing nightmare of tangled waterways (an englacial and subglacial drainage network making the glacier more Swiss cheese than white cheddar). Big pipes gush from the terminus creating notoriously silty, frigid, impassible rivers. The Kaagwaantaan and Chookaneidi Clan stories of Kaakex'wti describe detours of dozens of miles to avoid the massive Grand Pacific outlet river. By lubricating the underbelly of the glacier, the water creates a giant slip-n-slide. Glaciologists can see velocity increase dramatically during the day and decrease at night. The glacier practically breathes in and out, faster and slower. Water also saturates ground-up rocky material ("till") underneath the glacier, which deforms like slow-moving mud under the immense weight, carrying the glacier along for a joy ride.</p>

<p><strong>The Riggs' history:</strong> The Riggs and Muir Glacier were joined until 1961. The 15-mile-long Riggs hung out in tidewater for another thirty years and didn't stop calving until roughly 1999 when the ice retreated above the high tide mark. Like most glaciers worldwide, the Riggs continues receding but remains accessible for now. From a high vantage, look for obvious crevasse patterns: transverse (side-to-side) crevasses where ice plunges more steeply (visible higher up on the left-hand branch), lateral shear crevasses along the sides (particularly prominent on the right-hand branch), and a prominent crosshatch checkerboard of seracs between the two branches.</p>

<p><strong>Outlet streams and ice caves:</strong> The largest outlet stream has for many years exited the right-hand branch, but outlet positions invariably shift. After a switch, the abandoned outlet can leave behind a beautiful, blue ice cave that wanders deep and far. Peek inward but think twice about entering -- glaciers slowly squeeze caves shut, but just as frequently, caves collapse instantly without warning.</p>

<p><strong>Kinematic waves:</strong> The largest outlet river crosses the intertidal mudflats with large standing waves that form just before and after low tide. These waves slowly migrate forward or backward, all moving in the same direction -- a classic example of kinematic waves.</p>

<p><strong>Ice semantics:</strong> Is it a glacier, ice stream, ice field, ice cap, or ice sheet? The park has around 1,045 glaciers (plus or minus) and one ice field (the Brady Icefield). Ice streams, ice caps, and ice sheets are separate beasts that live in polar regions.</p>`,
  dangers: `<p><strong>Mud flats:</strong> Mud flats can easily strand your boat at low tide or float it away as the tide rises surprisingly fast -- sometimes moving a foot inland every minute. Leave your kayak somewhere secure, or designate a sad and lonely boat tender to watch over the kayaks while everyone else gets to touch the pretty ice.</p>

<p><strong>Crevasses -- serious danger:</strong> Winter snow covers many holes and fissures, keeping them hidden. Snow bridges might hold your weight or collapse, killing untold numbers of people around the world, even experienced mountain climbers. You might walk along snow one second and fall a hundred feet the next. If the fall doesn't kill you, injuries might. Or the constant rain of near-freezing, clothes-soaking, hypothermia-inducing meltwater that drips into crevasses all summer. Or the inability to climb out of a vertical surface. Or getting stuck, wedged permanently in a nightmarishly tight claustrophobic space. Or the glacier might shift and entomb you. Use caution. Read Muir's near-fatal crevasse escapes in Stickeen before venturing onto ice.</p>

<p><strong>Out-of-date maps:</strong> There is no embayment in front of the Riggs Glacier, nor has there been for decades, despite claims by the latest 2019 Trails Illustrated, the 2023 Park Service map, and the 2024 NOAA ENC chart. Likewise, the Riggs Glacier has rapidly receded, leaving each map maker in the dust.</p>

<p><strong>McBride pass hike hazards:</strong> The 3.5-mile hike east along McConnell Ridge involves uncooperative deep fast-flowing rivers, rough unstable rocks, and remnants of orphaned ice hiding below surface rock. A humongous impassable outlet river often blocks the first mile, forcing an evil alder-bashing bushwhack on McConnell Ridge's lower slopes. Tread carefully on the dying ice at the top of the pass -- rocks slide on ice nearly as easily as feet.</p>`
},

  summary: `Only deglaciated about 40 years ago, the upper end of Muir Inlet echoes the Lower Bay's flora as experienced by John Muir and Samuel Hall Young in 1879 -- wide open and exposed mountain slopes in an alpine-like setting with few trees. When Sitka Charley described the woodless terrain ahead, Muir expressed disbelief, as did Young, Kadachan, Toyatte, and the other Tlingit -- this was outside their collective experience of Southeast Alaska "so heavily and uniformly are all the shores forested wherever we had been."

<p>Instead of insufferable alder, many hills wear dryas, a pretty little yellow-bloomed member of the rose family that colonizes early in the plant succession and bursts with joyful carpets of gently twisted cotton-seed puffs from mid- to late-August. These idyllic dryas mats soothe souls and soles, and the dense thickets that arrive after dryas haven't taken over the northern shores. Short walks uphill lead to commanding views of the fjord. The most serious obstacles to hiking are cold rivers rather than vegetation, and "at least for now -- no guarantees in 20 years -- this is the best and one of the few places in Glacier Bay that rewards off-piste travel and climbing."</p>

<p>Try ascending any beautiful ridge on the north side for a few hundred feet. Just over 40 years ago, your perch was under hundreds of feet of ice flowing from tributaries of the Mt. Brock massif; below in the main fjord, ice was almost a thousand feet thick stretching a hundred fathoms under the sea. Continue to the summit ridge and Mount Brock itself at 4,990 feet (expect snow and ice year-round) for views of the Riggs and other glaciers that will knock your socks off. Alternatively, take a long meander up one of the valleys through hummocks and low ridges to a fairyland of dryas and jewel-like tarns for a picnic lunch surrounded only by high peaks and heaven.</p>

<p>The more densely colonized south side mountains (an extension of Minnesota Ridge) have been ground down by the Muir Glacier on one side and the Cushing Glacier on the other. These rounded peaks lack the jutting personality of the northern mountains but compensate with waterfalls and moody clouds that swirl through shallow notches. After a week of heavy rains, thousand-foot cascades pour down nearly every crevice into an inlet that's almost always flawlessly flat and calm.</p>

<p>When you first turn west after leaving the Riggs Glacier, paddle close to the cliffs on the north side -- white, red, yellow, and black rocks recently exposed by the ice, still immaculately clean and free of vegetation. The glacial trimline is visible 1,100 feet above the water. A fabulously thin and lofty waterfall bisects these cliffs, bouncing and twisting until falling directly into the ocean where you can put a hand under the cascade from your kayak. At the opposite end nearest the Muir and Morse Glaciers, cliffs get improbably steeper, darker, and more forbidding -- quietly floating under these dimly lit sheer walls in thick fog feels "ominously heavy and somehow daring but also awe inspiring and geologically divine."</p>

<p>At the end of the inlet, the 11-mile-long Muir Glacier will probably disappoint. The ice receded above the water in 1991 and then moved inland another mile while thinning by hundreds of feet. In 2012, it still barely kissed the adjacent Morse Glacier, but a year later they separated for good -- a final indignity in a chain of divorces from the Grand Pacific (late 1850s), Adams, Casement, Plateau, McBride, and Riggs. The rough and long hike up to the Muir is full of pleasant surprises: dozens of kettles and meltwater lakes in rusty red, white, and jade-colored waters. A small terminal moraine blocks the final approach, and a roaring outlet river sometimes blocks access. But with care and luck, a scramble onto the ice rewards tenacity with hypnotic, electric-blue crevasses and palpable historical significance. "After all, this is Muir's glacier, and now it's partly yours too."</p>`,
  history: `<p><strong>Only here since 1991:</strong> Other than some squabbling about the position of the nearby international boundary -- leading to creatively named summits such as Boundary Peak 157 -- there has been very little human history. The recently retreated ice means the upper inlet's only pre-1970s visitors were intrepid glaciologists, boundary surveyors, and a few lonely prospectors. Even kayakers had a tough time visiting until the Muir retreated onto shore in 1991. Massive seracs above and dense flotillas of icebergs below -- a byproduct of the fastest retreat by any glacier in recorded history -- kept the inlet locked tight and mostly out of reach.</p>

<p><strong>Fremont Morse:</strong> The Morse Glacier almost certainly honors the well-liked surveyor Fremont Morse of the US Coast and Geodetic Survey who worked on the Alaska-Canada boundary in this area in the early 1900s (origin officially unknown). Confusingly, there's a second Morse Glacier in Glacier Bay named for an entirely different man.</p>

<p><strong>Mount Brock:</strong> Named for a Canadian geologist who visited in 1913.</p>

<p><strong>Gold, indifference, and treasures richer than gold:</strong> Like most of the bay, the mountains have valuable minerals scattered about, some only recently emerging as the ice recedes. Prospectors found polymetallic veins of gold, silver, copper, zinc, and antimony way up on the summit ridge of Mount Brock. John Muir and Samuel Young were notably disinterested in gold, surprising their Tlingit guides who wondered why these two men, unlike so many others, wanted to see ice instead of riches. Wrote Young, many years later: "We camped at the site of what is now Juneau, the capitol of Alaska, and no dream of the millions of gold that were to be taken from those mountains disturbed us. If we had known, I do not think that we would have halted a day or staked a claim. Our treasures were richer than gold and securely laid up in the vaults of our memories."</p>`,
  naturalHistory: `<p><strong>Glaciers and tidal flat cliffs:</strong> In less than 500 horizontal feet, the bathymetry at the west end of Muir Inlet plummets from a few fathoms to over 50 fathoms -- literally dropping over an underwater cliff. The unusually abrupt cliff is a brand-new edifice built since 1991 from massive amounts of glacier-sourced sediment.</p>
<p><strong>Extreme accumulation rates:</strong> Over the last 34 years, the silt has filled many hundreds of feet of water -- that's over an inch per day during summers when rivers flow strongest. It's the underwater summertime equivalent of a never-ending snowstorm of glacier flour accumulating inch by inch at the ocean bottom. This is sometimes called "marine snow" -- a ceaseless shower of both inorganic debris (the primary component here) and organic debris (more important in the Lower Bay). Blizzards of the stuff can drop underwater visibility to zero.</p>

<p><strong>Sediment concentration and cliff formation:</strong> Close to the glaciers, marine snow falls quickly and heavily; a short distance further, the supply dwindles and the water clears. Concentration of flour falls off exponentially with distance from source, leading to the formation of a step-like cliff in the bathymetry. In 10,000 years, if there are no major new glacier advances, the entirety of Glacier Bay will eventually fill to the brim with sediment.</p>

<p><strong>Cyclic sediment patterns:</strong> This pattern is partially visible in cylindrical cores drilled from the ocean floor, showing two distinct rock zones at the bottom of Muir Inlet: a lower zone of solid rock carved by humongous glaciers during the Last Glacial Maximum about 21,000 years ago, topped by compacted silt tens of thousands of years old. When the Muir Glacier advanced during the Little Ice Age (ca. 1200 to 1900), the ice bulldozed away much of that ancient silt, but some remains. Today, with most glaciers back on dry land, the cycle is starting over.</p>

<p><strong>Tasty gold and stibnite:</strong> A quick look upward at the colorful cliffs below Mount Brock shows amazing folds, dikes, intrusions, and pockets of sulfur-rich minerals. Prospectors found polymetallic veins of gold, silver, copper, zinc, and antimony on the summit ridge. Antimony (Sb) appears primarily as the sulfide mineral stibnite (Sb2S3) -- an unfortunate name for a gorgeous metallic silver-black needle-like crystal. In 2017 and 2022, the USGS listed stibnite as one of the most critical minerals for the nation's economy, security, and military.</p>

<p><strong>Dryas and plant succession:</strong> Many hills wear dryas, a pretty yellow-bloomed member of the rose family that colonizes early in plant succession. In mid- to late-August, it bursts with gently twisted cotton-seed puffs. The dryas mats provide excellent hiking on the north shore, though ankle-twisting rocks lie hidden underneath. The dense thickets that follow dryas in the succession haven't yet taken over the northern shores, but "no guarantees in 20 years." Interstadial trees -- 3,000 to 4,000 years old -- appear as large stumps and logs along the north shore.</p>

<p><strong>Alluvial fans and brand-new terrain:</strong> All the alluvial fans in Upper Muir Inlet did not exist 60 years ago when the Muir Glacier still filled this part of the inlet with ice. Given their rapid and ongoing evolution, your camp will quite likely be the first ever in that chosen location. "Few places in the world let you march across brand new terrain."</p>

<p><strong>Interstadial wood:</strong> Much of the wood in this area is interstadial and thousands of years old, far more valuable to scientists than any of the nearby gold. Along the north shore, interstadial stumps and logs predate glacier advances of the Little Ice Age and are an amazing 3,000 to 4,000 years old.</p>

`,
  dangers: `<p><strong>Tidal flats:</strong> The seemingly infinite tidal flats below Muir Glacier can easily strand your kayak a half-mile from water at low tide, or float it away as the tide rises. If hiking to the glacier, schlep boats well above the high tide and tie them to a big rock, or leave a sad and lonely designated driver to tend everyone's boats. The Muir Glacier outwash plain requires a half-mile to three-quarter-mile portage through ankle-twisting cobbles, back and forth multiple times. Float in at high tide and plan to leave about 25 hours later with the next daytime high tide.</p>

<p><strong>Spectacularly slippery rocks:</strong> Slippery algae coat some of the upper inlet's intertidal rocks, especially on the southeast side near the entrance. "Anyone who spends time here will sooner or later do a spectacular pirouette, throwing both arms and legs into the air while squeaking loudly in despair. Judges will award your dazzling tumbles a full slate of 10s shortly before deciding what to do with your L-shaped femur."</p>

<p><strong>Out-of-date maps:</strong> Every published map shows deep water where it's now barely a few feet deep at high tide. The entire Muir and Morse Glacier outwash plain and tidal flat accrued in a remarkably short 34 years. The tidal flat cliff -- plunging 300 feet underwater -- did not exist before 1991.</p>

<p><strong>Outwash plain rock bombs:</strong> If camping on the Muir Glacier outwash plain, rock bombs fall all night from the cliffs above. Unnerving but "kind of cool, sort of, not really." The adjacent slopes remain unstable after being rapidly unweighted by retreating ice.</p>

<p><strong>Brown bear activity:</strong> Watch for brown bear mark trails, particularly at the noisy waterfall campsite (28.11) and along the north shore. Several campsites note bear activity as a concern.</p>

<p><strong>River crossings:</strong> Cold, fast-flowing outlet rivers and streams are the most serious obstacles to hiking in the Upper Muir Inlet. Large meandering rivers can block access to glacier hikes entirely, forcing difficult scrambling around boulders, bluffs, and falls. Spring floods regularly change channels.</p>`
},

  summary: `Underrated and underappreciated, many kayakers skip White Thunder Ridge for icebergs and glaciers on the other side of the inlet. But these enchanting, crumbling walls swirl with twisting, decaying folds of sulfur and blood-wine minerals, dark igneous intrusions, and patchy emerald alder where mountain goats perch with "insanely situated nonchalance." Below are the usual low-tide stripes of yellow rockweed, blue mussels, white barnacles, green algae, and occasional icebergs for a mind-boggling polychromatic array. Reed-thin waterfalls spill 1,800 feet over the cliffs after heavy rain, and murrelets, guillemots, and occasional puffins float in the morning light. Paddling north, Mount Black and Brock loom large with Riggs Glacier on full display. The trade-off is commitment: there is nowhere to pull out for 1.5 hours, and rockfall is constant. Paddle quietly and spaced from your crew for the sake of the goats -- one of the bay's most visible herds navigates these bluffs as flecks of white, easily spooked. A startled nanny and her wobbly kid could have heartbreaking consequences. If you spot a goat at eye level, coast silently without paddling, gasp mutely, and look around -- if you see one, there are dozens concealed nearby.`,
  history: `<p><strong>Cooper and the formation of a park:</strong> The name "Minnesota Ridge" honors the University of Minnesota botany department where William Skinner Cooper lectured when not doing groundbreaking plant succession and ecology studies in Muir Inlet. Mount Cooper in the West Arm also recognizes his contributions. After attending a 1922 Ecological Society of America meeting, Cooper waxed eloquent about the bay's scientific value and scenic beauty. The society formed an exploratory committee (chaired by Cooper) that rallied conservation and scientific organizations, including the National Geographic Society. A bitter political fight ensued -- environmentalists and scientists versus miners, fox farmers, loggers, homesteaders, and Alaskan business interests -- spilling into intense negotiations between the inexperienced, ten-year-old Park Service and established agencies like the USGS and US Forest Service who wanted access for extraction industries.</p>
<p><strong>The Antiquities Act and national monument:</strong> With congressional approval stalled, Cooper changed tactics, lobbying President Calvin Coolidge to use the 1906 Antiquities Act. He compromised on monument size to quell Forest Service dissent, then launched a tremendous letter-writing campaign -- the largest the Park Service had ever seen. Coolidge assented and issued a proclamation creating Glacier Bay National Monument in 1925, specifically referencing its scientific value to glaciologists and ecologists. Though the Department of the Interior initially banned mining, President Roosevelt reopened the bay to extraction in 1936, prompted by exaggerated tales of struggling Alaskans. Cooper was aghast. The real story involved large mining interests and outsized personalities who "played at politics." Fortunately, 1930s-40s technology limited profitable operations to a few hobby mines. Congress finally banned mining in 1976, with the notable exception of undeveloped Brady Icefield nickel claims still in private hands.</p>
<p><strong>ANILCA and national park status:</strong> Four years after the mining ban, and sadly too late for Cooper to witness, Jimmy Carter signed the 1980 ANILCA bill turning the monument into Glacier Bay National Park, designating 2,664,876 acres of wilderness -- no roads, lodges, or gift shops. Fifty-eight years after Cooper's initial efforts, and with extended financial and moral support from the University of Minnesota, his vision prevailed.</p>
<p><strong>White Thunder photo station:</strong> Glaciologist Bill Field, a young Harvard geology student, was enchanted by Alaska and dug up pioneering studies by Reid, Tarr, Lawrence, and Gilbert. Encouraged by Reid and Lawrence, Field established precisely located "photo stations" for repeat photography. He first visited (self-funded) in 1926, returned in 1935 with Cooper, and made 13 more visits through 1983, afterward sending his son and biographer Suzanne Brown. From the White Thunder station, his photos show the Muir Glacier retreated from Westdahl Point to McConnell Ridge in just nine years while thinning 325 vertical feet. In that same time, alder established a foothold faster than the standard 30-year progression (lichens to dryas to thin soils to alder) -- the loose rock helped alder grab hold. Many "then and now" photos in the Visitor Center and climate news stories feature Field's work. Bruce Molnia reoccupied the station in 2004 to shocking results -- alders have completely blanketed the ridge since 1935. Future visits will be both challenging and of limited value; the alder thickets have won.</p>
<p><strong>A Tlingit appellation:</strong> Photographer Douglas Brown of the American Geographical Society named White Thunder Ridge from Field's photo station in 1946, awestruck by reverberating thunder as the Muir and recently separated McBride Glaciers rapidly disintegrated 1,000 feet below. The name alludes to the Tlingit description of "white thunder" as the roar made by calving ice.</p>
<p><strong>Westdahl, Wolf, Stump, and Curtis:</strong> The US Coast and Geodetic Survey vessel Westdahl visited Glacier Bay in 1938-1940 (possibly 1936). Wolf Point had wolf tracks in 1941. Stump Cove has interstadial stumps. Curtis Hills honors Edward S. Curtis, the famed Indigenous American photographer who joined the Harriman Expedition to Glacier Bay in 1899.</p>`,
  naturalHistory: `<p><strong>Orphaned ice and the equilibrium line altitude (ELA):</strong> Glaciers feed on winter snows at high elevations. Above the ELA, glaciers hoard snow year-round; below, summer melting exceeds accumulation. As climate change warms the world, the ELA climbs upward. The 2018-2022 ELA in Glacier Bay hovered around 3,300 feet. The Burroughs Glacier's highest nearby elevation is only 3,030 feet -- the ELA has abandoned it. An unnamed glacier between White Thunder and Minnesota Ridges suffered the same fate, dying and leaving Lawrence Lake -- curiously absent from most maps. Plateau Glacier in Wachusett suffered similarly before dying in the 2000s.</p>
<p><strong>Orphaned ice and ELA:</strong> The 2018-2022 equilibrium line altitude in Glacier Bay hovered around 3,300 feet. The Burroughs Glacier's highest nearby elevation is only 3,030 feet -- the ELA has abandoned it. An unnamed glacier (the Muir Remnant) died similarly, leaving Lawrence Lake -- curiously absent from most maps. Anthropogenic climate change will likely starve hundreds of small glaciers.</p>
<p><strong>Mountain goats (Oreamnos americanus):</strong> Southeast Alaska and British Columbia have more mountain goats than anywhere in the world. Their soft suction-cup-like hooves have rubbery pads between hard-gripping keratinous toes with sharp anti-slip dewclaws. Both males (about 280 lbs) and females (about 180 lbs) have beards and slightly curved horns. Nannies tend single newborn kids. Typical goats live 9-15 years. White Thunder has reliable sightings for quiet kayakers.</p>
<p><strong>Lawrence Lake cartographic blunder:</strong> One of the park's largest lakes (half-mile wide, 1.5 miles long, bright teal-blue) is absent from almost all maps. The 2024 NOAA chart still shows the original glacier.</p>
<p><strong>Ancient wood:</strong> Scientifically valuable interstadial wood peppers the area. Large tree stumps or logs may be 2,000+ years old. Resist bonfires unless certain of the wood's genesis.</p>`,
  dangers: `<p><strong>Rockfall:</strong> Recently unloaded by glacier ice, cliffs are expanding outward and spalling rocks. Climate change freeze-thaw cycles loosen already crumbling rock. Mountain goats kick up material. Although a direct strike by a sizable rock is a one-in-a-million chance, avoid the near-constant rain of stones by paddling a safe distance from the walls.</p>
<p><strong>No pull-outs:</strong> White Thunder Ridge has no campsites and no beaches along the cliffs. It is a 1.5-hour paddle from one end to the other. Plan additional time for goat watching.</p>
<p><strong>Bladder planning:</strong> For bladder-challenged kayakers, take advantage of Wolf Cove or a beach in Upper Muir Inlet before paddling White Thunder Ridge.</p>
<p><strong>Commitment and drift hazard:</strong> When forgetting yourself while goat-gazing, it is easy to drift too close to the cliffs. Stay alert and maintain safe distance.</p>
<p><strong>Bear corridors:</strong> The freshwater stream between Stump Cove and Wachusett is used by brown bears. Wolf Cove's freshwater is troublesome at low tide. Avoid Wolf Cove camp during salmon runs from late July onward.</p>`
},

  hiking: 'Acceptable — long beaches, open slopes, stream hikes, outwash plain',
  summary: `Ignore the mapmakers -- the Plateau Glacier is gone forever, the Carroll Glacier has receded far up the valley, and the last mile of inlet is now a shallow tidal flat (maps show 276-foot depths; it is barely 3 feet deep at high tide). An unmapped two-mile-long lake fills the valley north of the Bruce Hills, fed by the clinically depressed Burroughs Glacier -- a sad dirty remnant, hidden and doomed. But Wachusett remains enchanting: closed to motorized travel July 16 to August 31 (pending extension to September 15). The guiding principle: if you want to avoid people, avoid the easy glaciers and most impressive summits. Near the entrance, alpenglow on Red Mountain, the crevassed Riggs Glacier, and Muir's inspirational Snow Dome will make your inner artist sing. Further back, long cirques flank the south shores with an overabundance of waterfalls. The Carroll and Grand Pacific vie for the park's longest single glacier (30-40 miles each, counting Canadian origins). The Carroll stretches nearly two miles wide and climbs northward into distant clouds to Boundary Peak 158 on the Canadian border, then turns and continues 15 miles into Tatshenshini-Alsek Provincial Park. The real treat is quieter wilderness moments -- thousands of scoters in fog, moose babies teetering along shore, electric teal water, fields of puffy dryas, and a dozen brown bears fighting over salmon. An aging notch-finned harbor porpoise settled in every summer at South Burroughs Creek and played off the author's bow for miles on three occasions.`,
  history: `<p><strong>Tired old USS Wachusett:</strong> "Wachusett" is an Algonquin word meaning roughly "near the mountain." The 1,032-ton sail- and steam-driven sloop-of-war cruised into Glacier Bay in 1881. The ship could not visit Wachusett Inlet, which opened to water only around 1915. The inlet was first called Cushing Inlet, then Wisconsin Inlet, then Wachusett for reasons nobody can explain. Rear Admiral Beardslee (of the Beardslee Islands) also served on the USS Wachusett during the Civil War when it captured the Confederate CSS Florida in Brazil.</p>
<p><strong>Muir's friend wasting away -- the Burroughs Glacier:</strong> The Burroughs sits entirely below its equilibrium line and collects no new snow. It was named for John Burroughs, a famous naturalist with a long white bushy beard to match Muir's tangled chest-length red beard. Two peas in an argumentative pod on the 1899 Harriman Expedition, their good-natured ribbing entertained the entire crew.</p>
<p><strong>Miner Bruce and pesky eye eaters:</strong> Reporter Miner Bruce (namesake of Bruce Hills) visited for six weeks researching his 1899 gold-rush-promoting book. He offered useful advice: "Do not neglect mosquito netting. Mosquitoes and gnats often assume the proportions of a scourge in Alaska, and have been known to drive bears wild."</p>
<p><strong>Kloh Kutz -- Hole in the Cheek:</strong> Glaciologist Bill Field named nearby Mount Kloh Kutz after a powerful Chilkat Tlingit chief. This naming was culturally insensitive -- this is Huna country. According to Eliza Scidmore, the chief had a hole in his cheek acquired when a clansman fired a revolver. Weak gunpowder prevented lethal damage, and the showman reportedly swallowed his teeth, spat out the bullet, and handed it back saying, "You cannot hurt me. See!"</p>
<p><strong>Art history -- Louis Shotridge:</strong> Kloh Kutz's grandson Louis Shotridge (1882-1937) collected Tlingit artifacts for the University of Pennsylvania Museum, hoping to preserve a misunderstood culture. In 2017, some artifacts returned to Alaska, visiting the Huna Ancestors' House before repatriation in Hoonah.</p>
<p><strong>South Burroughs Creek mapping errors:</strong> The latest Trails Illustrated map shows a bizarrely narrow inlet at this location -- it does not exist. The adjacent "island" now connects to the mainland except at the highest storm-surge tides.</p>`,
  naturalHistory: `<p><strong>Colonizing a new river -- Stonefly Creek:</strong> Underneath ice for centuries, this small river first emerged from the Plateau Glacier remnant in the late 1970s. Ecologists exhaustively monitored its development. Within 10 years, a brand-new stream developed a thriving biotic community; within 20 years, nearly as productive as streams hundreds of years old -- upending the paradigm of slow successional development. Pink salmon, Dolly Varden, sockeye, coho, sticklebacks, and sculpins colonized. Brown bears arrived to fish.</p>
<p><strong>Carroll Glacier and proglacial features:</strong> Carroll's slowly ramping ice has few crevasses at the terminus. The 4-mile approach across the outwash plain includes perfectly round kettles, shallow silt-filled lakes, crumbling moraines, and serpentine eskers. For the first 6-7 miles, the Carroll is one of the easiest and safest glacier hikes in the park. A 12-hour commitment is needed to ride in on high tide, march over moraines, and exit with the next high tide.</p>
<p><strong>Nonmotorized boundary:</strong> From July 16 to August 31, federal law closes Wachusett Inlet east of a marked boundary. The park plans to extend this closure to September 15.</p>`,
  dangers: `<p><strong>Bears and salmon rivers:</strong> South Burroughs Creek has a biannual run of pink salmon, favored by every bear in a wide radius. Sometimes 8-10 bears feed simultaneously. Avoid camping at South Burroughs Creek from mid-July through September -- one of the "stupidest campsites in Glacier Bay" during salmon runs.</p>
<p><strong>Shoals:</strong> About 1.3 nmi inward from Rowlee Point, watch for shallow kayak-biting rocks on the south side -- part of a bedrock rise and old terminal moraine. The charts mark this area as "Foul."</p>
<p><strong>Mapping errors:</strong> Both maps and charts show ice where none exists, land where there is water, and water where there is land. The Plateau Glacier is completely gone. The last mile is barely 3 feet deep at high tide (maps show 276 feet). An unmapped two-mile-long lake fills the valley north of Bruce Hills.</p>
<p><strong>Outwash plain hazards:</strong> Securing kayaks above high tide on the Carroll Glacier outwash is very difficult. The tide moves phenomenally fast across the flats.</p>
<p><strong>Portage craziness:</strong> Queen Inlet looks tantalizingly close from the northwest end. The Carroll outwash features rough loose rock, braided fast-flowing rivers, deep mud -- fine for a day hike, "phenomenally stupid for a portage."</p>`
},

  coords: [[58.935,-136.140],[58.935,-136.128],[58.925,-136.120],[58.914,-136.115],[58.910,-136.128],[58.905,-136.118],[58.880,-136.118],[58.860,-136.112],[58.842,-136.118],[58.825,-136.125],[58.808,-136.142],[58.795,-136.152],[58.795,-136.100],[58.820,-136.092],[58.845,-136.088],[58.870,-136.092],[58.895,-136.098],[58.920,-136.108],[58.935,-136.120]],

  hiking: 'Relationship destroying — nice long beach strolls though',
  summary: `The west side of lower Muir Inlet drifts past with the fewest highlights — one tree-lined campsite looks much like the rest. But in compensation, these long uninterrupted beaches have intensely secluded wilderness charisma. No safe harbor for large vessels means no generators, no shipboard music — just you, an occasional moose, wolf, or harlequin duck. Wolves are spotted here more than almost anywhere else in the park. "If a pack howls nearby, that could be the capstone of your visit, perhaps your decade." North of Morse Creek, calm waters bless kayakers with almost flawlessly flat, dreamy water reflecting the medial-moraine-striped Casement Glacier. South of Morse Creek, much rougher seas prevail when water rises from over 1,000 feet deep to only 200 feet deep in just a couple miles.`,
  history: `<p><strong>Morse Glacier version 1.0:</strong> There are two Morse Glaciers -- the well-known one at the tippy-top of Muir Inlet and the original at the end of Oberlin Ridge. Harry Fielding Reid named the original for one of his student assistants on the famous 1890 expedition. Reid originally used mundane names: Morse was "West Tributary of Muir Glacier," Adams was "Southeast Tributary," Casement was "First North Tributary." Eliza Scidmore insists Muir -- not Reid -- renamed the glaciers. Today the original Morse Glacier lingers near death.</p>
<p><strong>Rat Nunatak:</strong> During the 1880s-1890s, local steamship captains used colorful nicknames. The 1,850-foot peak south of Hunter Cove was "the Rat" -- a counterpoint to the more diminutive "Mouse" (Klotz Hills). Reid kept a surveying station with a cairn on its summit. Today it is buried in impenetrable alder.</p>
<p><strong>The not-icy Ice Valley:</strong> Ice Valley used to host the aptly named Dying Glacier that made a shortcut between Tidal and Muir Inlets. Reid, Cushing, and McBride used it to climb Pyramid Peak in 1890. The Dying Glacier perished in the early 1900s.</p>`,
  naturalHistory: `<p><strong>Spits, drifts, and tombolos -- the science of longshore drift:</strong> Incoming tides and southerly storms punch waves obliquely onto the coastline. Water goes up one direction and down another, slowly shifting pebbles in an everlasting zigzag -- this is "beach drift." Tides also create massive parallel-to-shore "longshore currents." When a zigzagging pebble reaches a place where the shore turns abruptly, it misses the turn and shoots offshore, forming a "spit." The Morse Creek spit is about a thousand feet long and still growing. At spit ends, waves refract and carry finer sediments inward creating a hook-shape or "recurve." When a spit builds outward to an island, it becomes a tombolo -- an old Italian word for "a small bank of sand thrown up by the sea." Nice examples extend south of Tidal Inlet, from Willoughby's west side, Sebree's east side, Tlingit Point, and Shag Cove.</p>
<p><strong>Interstadial trees:</strong> Between campsites 31.5 and 31.6, many wonderful interstadial stumps stick out of shingle beaches and intertidal muck below Rat Nunatak. Some are gigantic remnants; others are coated with black mussels and slimy algae. They predate the last advance of the Muir Glacier during the Little Ice Age.</p>
<p><strong>Wolves:</strong> Paddlers spot more wolves around Ice Valley River and Caroline Point than at almost any other location in the park. Wolves are secretive and minimize human interactions. They have never -- not once -- hurt a person inside the park. If you see one, rejoice.</p>`,
  dangers: `<p><strong>Rough seas south of Morse Creek:</strong> Water rises abruptly from over 1,000 feet deep to only 200 feet deep in just a couple of miles between Muir Point and Caroline Point. Open waters churn violently during spring tides. Novices should wait for slack tide.</p>
<p><strong>Rare but spectacular storms:</strong> Two or three times each summer, northbound wind collides with southbound tide. Waves stretch to 3-4 feet, sometimes cresting 8-10 feet. The Beardslee Islands slowly disappear, followed by North Marble Island. Paddling to Sebree pickup can be impossible. Plan an extra day in Bartlett Cove as a hedge.</p>
<p><strong>Open water crossing:</strong> Crossing Muir Inlet becomes increasingly easy heading north and substantially harder in the far south. Novices should cross as far north as possible.</p>
<p><strong>Shoals and rocks:</strong> Caroline Point extends much further into the inlet than expected. Point McLeod has barely submerged, kayak-sinking rocks.</p>
<p><strong>Unreliable fresh water:</strong> Many streams shown on maps are seasonal or nonexistent. Plan on adequate water only at Morse Creek and the Ice Valley River. Smaller semi-perennial streams drain between Rowlee and McLeod Points, at Hunter Cove, at the end of Idaho Ridge beneath Rat Nunatak, and just north of Morse Creek -- but all can wither to unreliable trickles during drought or late summer dry spells.</p>
<p><strong>Storms:</strong> Like nearby Tlingit Point, the southern end of Muir Inlet gets rough during strong winds. The long fetch of open water to the south guarantees trouble at least a few times each summer.</p>`
},

  center: [dms(58,45,15), -dms(136,13,0)],
  coords: [[58.795,-136.103],[58.790,-136.120],[58.782,-136.140],[58.772,-136.148],[58.762,-136.152],[58.755,-136.158],[58.752,-136.175],[58.751,-136.195],[58.750,-136.218],[58.750,-136.245],[58.738,-136.245],[58.738,-136.215],[58.740,-136.185],[58.742,-136.160],[58.744,-136.140],[58.750,-136.118],[58.762,-136.100],[58.778,-136.098]],
  distance: '5 nmi (6 mi, 9 km)',
  traverse: '2 hours',
  hiking: 'Relationship destroying — superb beaches though',
  summary: `Tlingit Point splits the East Arm from the West Arm with stunningly wide vistas — the most expansive in the bay. To the left, the entire Beartracks down to the Beardslees. To the right, the Marble and Hugh Miller massifs. And outward, a foggy eternity of fading peaks. Sea lions sun on boulders, bears swim to the off-limits bird island, and humpbacks feed on the shallow shelf. Sebree Island is the standard tour boat pickup and drop-off. When storms hit, Muir's words ring true: "In storms Nature has always something extra-fine to show us." A shallow offshore shelf followed by a 100-fathom drop encourages humpbacks to feed along the coast. Winds strike from every direction but due north.`,
  history: `<p><strong>Seal hunting camp:</strong> Officially named Tlingit Point (some old maps say "Thlingit Point"), the original moniker was assigned by W. S. Cooper in 1937 while studying plant succession. Cooper named the point after Huna Tlingit seal hunters who frequently camped here.</p>
<p><strong>The ethereal Silent City:</strong> Meet smooth-talking Richard "Dick" Willoughby of Willoughby Island fame. Around 1881, Willoughby opened a trading post in Bartlett Cove. On the summer solstice of 1885 (or 1888), Willoughby "discovered" a massive spire-filled city floating above the Muir Glacier -- only a Fata Morgana mirage. But in the illusion, Willoughby "smelled an opportunity." He doctored a photograph of Bristol, England and sold prints at 75 cents ($25 today), claiming he had torn from the glacier's "chilly bosom the mirages of cities from distant climes." Nobody noticed the leafless elm trees at the height of summer. "A more transparent fraud could hardly be devised, but its imbecility assures its success," said Popular Science in 1897.</p>
<p><strong>Bruce's disappearance:</strong> Enlisting journalist Miner Bruce, they made a ballyhooed 1889 voyage. Bruce "disappeared" into the fog. He reemerged three days later, limping and with head heavily bandaged, swearing he glimpsed the Silent City but could not photograph it. Silent City photographs "went like hotcakes."</p>
<p><strong>Debunking:</strong> Scidmore debunked the myth in her 1893 Alaska guidebook: "The so-called Phantom or Silent City was a hoax of Dick Willoughby's in 1889. Thousands of prints from a cloudy negative of Bristol, England, were sold." The Pacific Coast Steamship Company encouraged the rumors, suggesting tourists might see the Phantom for the round-trip price of $130 ($4,800 today).</p>
<p><strong>The Tlingit name:</strong> The Tlingit called nearby Muir Point "Hinxuka.aani" or "Village [Reflected] on the Surface of the Water" -- likely a reference to the same Fata Morgana mirages seen from this area.</p>
<p><strong>Interstadial wood:</strong> In 2008, scientists identified amazingly ancient 4,000- to 5,000-year-old interstadial trees along the Tlingit Point shores. Much of the area's "driftwood" is actually ancient wood recently eroded from the beaches. Do not burn it for bonfires.</p>
<p><strong>Spits and lagoon at Tlingit River:</strong> The east-side spit is small (about 300 feet) and apparently stalled. The more impressive 600-foot west-side spit has a small recurve and extends another 1,000 feet east of the river. Someday during a long drought, the two spit portions will join to dam the stream, forming a small lagoon.</p>`,
  naturalHistory: `<p><strong>Ground nesting seabirds:</strong> The off-limits two-acre islet hosts one of the densest concentrations of ground-nesting birds in the bay. In mid-June 2005, ornithologists surveyed 25 Arctic tern nests, 3 oystercatcher nests, 4 glaucous-winged gull nests, and 4 short-billed gull nests. Arctic terns migrate 12,500+ miles from the Antarctic -- the longest migration of any animal.</p>
<p><strong>Fata Morgana mirages -- the science:</strong> Cold ocean water cools a thin boundary layer of dense air. On calm clear days, warm air above creates a "thermal inversion" and "atmospheric duct" where light bounces like a fiber-optic cable. Distant images travel from well below the horizon. North Marble Island cliffs double in height. Cruise ships triple and stack. The Tlingit River area is one of the world's best locations for Fata Morgana.</p>
<p><strong>Inversion smog and cruise ship pollution:</strong> The same inversions trap cruise ship exhaust in a rusty brown haze. Idling cruise ships generate the equivalent exhaust of 34,400 tractor trailers. Carnival Corporation has been fined over $107 million for illegally dumping oil, sewage, hazardous waste, and garbage. Carnival illegally dumped 22,500 gallons of greywater into Glacier Bay; the park fined them $250.</p>
<p><strong>The park can do better:</strong> Many smaller companies are turning to hybrid and all-electric ships, automated sail-assisted propulsion, and green hydrogen. Some already operate in Norway and China.</p>`,
  dangers: `<p><strong>Southerly storms:</strong> Strong winds and difficult waves smash into this coast a few times each summer. During one storm, 12-foot swells forced 26 motorized vessels to request national park assistance. Track weather, noting any "3- to 4-foot seas" predictions.</p>
<p><strong>Sebree pickup risk:</strong> The southern point of Sebree Island is especially rough in wind. The tempting alternative of scooting down the mudflat on the north side does not work -- the Trails Illustrated map correctly printed "Not Passable" in bright red. Isostatic rebound has lifted the area above sea level. Plan an extra day in Bartlett Cove as a hedge.</p>
<p><strong>Winds from all directions:</strong> Tlingit Point splits the East Arm from the West Arm, so winds strike from every direction except due north. Protection is minimal.</p>
<p><strong>Caroline Point shoals:</strong> Caroline Point extends much further into the inlet than expected. Paddle well beyond what seems necessary.</p>
<p><strong>Storm shelter:</strong> If surf is up, the muddy cove behind the small tidal island at campsite 32.6 is the only safe place to park a kayak for a long five-mile stretch.</p>
<p><strong>Sebree proximity rules:</strong> The Park Service prefers campers stay at least one mile from the Sebree takeout. Several nearby campsites (32.3, 32.5, 32.6) are technically too close but can be used when the pickup is elsewhere.</p>`
}
];

// Difficulty-based colors
const diffColors = {
  'Beginner':     { fill: '#1b4332', border: '#74c69d', hover: '#2d6a4f', label: '#74c69d' },
  'Intermediate': { fill: '#3a2e07', border: '#f0c040', hover: '#5a4a10', label: '#f0c040' },
  'Advanced':     { fill: '#4a1520', border: '#f07070', hover: '#6a2535', label: '#f07070' },
  'Variable':     { fill: '#1a2744', border: '#7ec8e3', hover: '#2a4060', label: '#7ec8e3' }
};

chapters.forEach(ch => {
  const dc = diffColors[ch.difficulty] || diffColors['Variable'];
  const style = {
    color: dc.border,
    weight: 2,
    opacity: 0.7,
    fillColor: dc.fill,
    fillOpacity: 0.25
  };
  const poly = L.polygon(ch.coords, style).addTo(map);

  // Label
  L.marker(ch.center, {
    icon: L.divIcon({
      className: 'chapter-label',
      html: `<div style="
        display: inline-block;
        background: rgba(13,27,42,0.92);
        color: ${dc.label};
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: bold;
        font-family: Georgia, serif;
        white-space: nowrap;
        border: 1px solid ${dc.border};
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        letter-spacing: 0.3px;
      ">${ch.num}. ${ch.name.split(' — ')[0].split('&')[0].trim()}</div>`,
      iconAnchor: [60, 14]
    })
  }).addTo(map);

  poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.45, weight: 3, color: dc.hover }); });
  poly.on('mouseout', function() { this.setStyle(style); });

  poly.on('click', () => {
    const body = `
      <p>${diffBadge(ch.difficulty)} <span style="color:#8899aa;font-size:0.82rem;">Chapter ${ch.num}</span></p>

      <p style="font-size:0.84rem;color:#8899aa;">
        <strong>Distance:</strong> ${ch.distance}<br>
        <strong>Time to traverse:</strong> ${ch.traverse}<br>
        <strong>Hiking:</strong> ${ch.hiking}
      </p>

      <h3>Overview</h3>
      <p>${ch.summary}</p>

      <div class="link-section">
        <a class="detail-toggle" data-target="${ch.id}-photos" data-label="Photos">Photos</a>
        <a class="detail-toggle" data-target="${ch.id}-hist" data-label="Natural History & History">Natural History & History</a>
        <a class="detail-toggle" data-target="${ch.id}-danger" data-label="Dangers & Challenges">Dangers & Challenges</a>
      </div>

      <div class="detail-content" id="${ch.id}-photos">
        <h3>Photos from this Region</h3>
        ${getPhotoGridHTML(ch.num)}
      </div>

      <div class="detail-content" id="${ch.id}-hist">
        <h3>History</h3>
        ${ch.history}
        <h3>Natural History & Science</h3>
        ${ch.naturalHistory}
      </div>

      <div class="detail-content" id="${ch.id}-danger">
        <h3>Dangers & Challenges</h3>
        ${ch.dangers}
      </div>

      <h3>Campsites in this area</h3>
      ${campsites.filter(c => c.ch === ch.num).map(c => `
        <div class="camp-card">
          <h4>${c.id} — ${c.name}</h4>
          ${c.tags.map(t => campTag(t)).join('')}
          <p>${c.desc}</p>
        </div>
      `).join('') || '<p style="color:#667;">No specific campsites documented for this section.</p>'}
