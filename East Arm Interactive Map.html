<body>

<div id="map"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>

<div id="title-overlay">
  <h1>Glacier Bay Volume 2: East Arm &amp; East Side</h1>
  <p>The Kayaker's Companion — David Bahr &middot; Click regions or camp markers</p>
</div>

<div id="legend">
  <b>Legend</b><br>
  <span class="legend-color" style="background:#3a7ca5;"></span> Chapter region (click for overview)<br>
  <span class="legend-color" style="background:#e85d26;"></span> Campsite (click for details)<br>
  <span class="legend-color" style="background:#66bb6a;"></span> Our campsite (selected)<br>
  <span class="legend-color" style="background:#74c69d;"></span> Beginner
  <span class="legend-color" style="background:#f0c040;"></span> Intermediate
  <span class="legend-color" style="background:#f07070;"></span> Advanced
</div>

<div id="panel">
  <div id="panel-header">
    <h2 id="panel-title"></h2>
    <div class="subtitle" id="panel-subtitle"></div>
    <button id="close-btn" onclick="closePanel()">&times;</button>
  </div>
  <div id="panel-body"></div>
</div>

<button id="planner-btn" onclick="togglePlanner()">Our Campsites</button>

<div id="planner">
  <div id="planner-header">
    <h2>Our Campsites <span id="planner-count-badge"></span></h2>
    <div class="subtitle">Check off where we're staying</div>
    <button id="planner-close" onclick="togglePlanner()">&times;</button>
  </div>
  <div class="share-section">
    <button class="share-btn" onclick="copyShareCode()">Copy Share Code</button>
    <div class="share-row">
      <input class="share-input" id="share-input" type="text" placeholder="Paste a code from someone...">
      <button class="share-load-btn" onclick="loadShareCode()">Load</button>
    </div>
    <div class="share-toast" id="share-toast"></div>
  </div>
  <div id="planner-body"></div>
</div>

<script>
// ── Map setup ──
const map = L.map('map', {
  center: [58.78, -136.05],
  zoom: 10,
  minZoom: 9,
  maxZoom: 15,
  zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors | Data: <em>The Kayaker\'s Companion Vol.2</em> by David Bahr',
  maxZoom: 18
}).addTo(map);

// ── Helper: DMS to decimal ──
function dms(d, m, s) { return d + m/60 + s/3600; }

// ── Panel functions ──
function openPanel(title, subtitle, bodyHtml) {
  document.getElementById('panel-title').innerHTML = title;
  document.getElementById('panel-subtitle').innerHTML = subtitle;
  document.getElementById('panel-body').innerHTML = bodyHtml;
  document.getElementById('panel').classList.add('open');
  // Wire up toggles
  document.querySelectorAll('.detail-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      if (target) target.classList.toggle('open');
      btn.textContent = target.classList.contains('open') ? 'Hide ' + (btn.dataset.label || 'details') : btn.dataset.label || 'Show details';
    });
  });
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// ── Difficulty badge ──
function diffBadge(level) {
  const cls = {
    'Beginner': 'badge-beginner',
    'Intermediate': 'badge-intermediate',
    'Advanced': 'badge-advanced',
    'Variable': 'badge-variable'
  }[level] || 'badge-variable';
  return `<span class="badge ${cls}">${level}</span>`;
}
function campTag(tag) {
  const cls = {
    'Popular': 'camp-tag-popular',
    'Favorite': 'camp-tag-favorite',
    'Unique': 'camp-tag-unique',
    'Challenging': 'camp-tag-challenging',
    'Caution': 'camp-tag-caution'
  }[tag] || 'camp-tag-popular';
  return `<span class="camp-tag ${cls}">${tag}</span>`;
}

// ═══════════════════════════════════════════════
// CHAPTER DATA — Regions (Macro)
// ═══════════════════════════════════════════════

const chapters = [
{
  id: 'ch17',
  num: 17,
  name: 'Bartlett Cove & Park Headquarters',
  difficulty: 'Beginner',
  center: [dms(58,27,0), -dms(135,55,0)],
  coords: [[58.441,-135.940],[58.437,-135.920],[58.437,-135.900],[58.441,-135.887],[58.450,-135.878],[58.458,-135.880],[58.465,-135.891],[58.469,-135.908],[58.468,-135.926],[58.462,-135.938]],
  distance: '1.5 nmi east to west (1.7 mi, 2.8 km)',
  traverse: '30 min around Lagoon Island; 3 hrs to explore both shores',
  hiking: 'Excellent — official trails, Forest Trail (0.7 mi), Bartlett River trail (2 mi), Bartlett Lake trail (4 mi)',
  summary: `Most kayakers consider Bartlett Cove as little more than a logistical stop, but it has a frontier-edge-of-the-wilderness feel -- a busy but relaxed oasis of excited paddlers and sightseers. Imagine rainforest paradise rather than high mountain peaks, and good beer on a covered deck instead of dehydrated glop in the rain. The park's only official trails wind through gorgeous Sitka spruce. The 0.7-mile Forest Trail makes a leisurely stroll past Blackwater Pond; the 2-mile Bartlett River Trail takes 3 hours round trip; at the halfway point, the Bartlett Lake Trail splits off for a 4-mile trek to the lake (6-7 hours round trip). Any hike is less about the destination and more about moseying through spongy moss, ferns, and fungi.<p></p>As a kayaking day trip, rent from Glacier Bay Sea Kayaks (reserve well in advance). If you can read tides, try a fantastic 2-hour trip through the Beardslee Cut and up the Bartlett River until boulders block the passage. The Cut is only navigable at high tide -- enter 30 minutes before peak flood and return no later than 30 minutes after. Miss the window and your next opportunity is 12 hours away or a grueling portage across slippery shin-bashing rocks. Experienced paddlers can attempt a 6-hour loop: west out Bartlett Cove, up Sitakaday Narrows to the Beardslee Entrance, past Eider Island, and back via the Beardslee Cut (advanced only; requires 10.3 ft of water).<p></p>Before heading into the wilderness on the daily tour boat, test your kayak's seaworthiness -- frayed bow lines, bent rudders, missing hatch covers have all stranded paddlers 40 miles up bay. Walk around the dock for intertidal life -- 3-foot-tall giant plumose anemones, skittering crabs, occasional giant octopus, and endangered sunflower sea stars. Visit the Huna Ancestors' House (Xunaa Shuka Hit) with its Sea Otter Canoe (Yuxch' Yaakw), Snow the articulated humpback whale skeleton, ranger talks, and halibut at the historic Lodge. The sacred Ceremonial Beach in front of the parking area was the site of an important 1992 Tlingit protest -- avoid launching kayaks from there.`,
  history: `<p><strong>Becoming the park gateway (1950):</strong> Chief Ranger Duane Jacobs barged a small WWII military building from Pleasant Island to Lagoon Island over 5 days. For the prior 25 years, no administrative presence existed -- Canadian cruise ships landed illegally, poachers operated freely, miners worked undocumented claims. The 1949 purchase of a Huna allotment began today's build-out. The 1952 Master Plan connected the monument to the Gustavus airfield by road. The 1956 "Mission 66" plan brought a $1.8 million cash infusion -- first real docks, ranger station, and in 1966, the Lodge (which won two design awards).</p>
<p><strong>Gustavus:</strong> The famously flat town sits on a WWII-era B-29 airstrip paved inside the monument. The name comes from nearby Point Gustavus -- naturalist William H. Dall thought it honored Swedish King Gustavus Adolphus, but it actually honored Prince Adolphus, Duke of Cambridge. Alternatively, ship's Master Lieutenant Gustavus Hanus (who did all the survey work) may be the true namesake. Before 1924, the town was called "Strawberry Point." Visit ToshCo grocery (closed Sundays), Fireweed Gallery, the old-timey gas station, the Salmon River, the ferry dock beach, or the short 1957 plane crash trail (wreckage still there).</p>
<p><strong>The Huna Ancestors' House (Xunaa Shuka Hit):</strong> Features hand-carved logs floor to ceiling. Kaasteen occupies center stage with abalone eyes -- the young woman whose insult provoked the glacier to destroy the village L'eiwshaa Shakee Aan around 1750. Above her, the animated spirit of Sit'k'i T'ooch' (the Grand Pacific Glacier) prepares to swallow her, complete with ears that can hear, surrounded by nine individually carved icebergs. An unpainted canoe represents visitors of unknown clan -- you and me, welcomed as part of the Huna narrative. Four clan canoes are symbolically anchored: Wooshkeetaan (shark crest, cedar bark rope), Kaagwaantaan (wolf and bear), Chookaneidi (porpoise and octopus), and T'akdeintaan (kittiwake morphing into whale tail). In 2016, all four clans celebrated a triumphant return, arriving in three hand-carved canoes across Icy Strait.</p>
<p><strong>Gaathéeni summer camp:</strong> Before the monument's 1925 establishment, the Tlingit maintained Gaathéeni on the Lester Island side -- summer homes, salmon drying racks, and Dick Willoughby's trading post. Eliza Scidmore wrote an extensive report including children posing on an iceberg floating in Bartlett Cove (icebergs were common in 1883 but rare today). A salmon cannery (Bartlett Bay Packing Company, 1883-1910) employed many residents. Scattered through the forest are "culturally modified trees" -- Sitka spruce showing long narrow scars from traditional bark harvesting. George Emmons photographed houses covered in spruce bark in 1888.</p>`,
  naturalHistory: `<p><strong>Reconstructing geology with Tlingit oral history:</strong> Before the Little Ice Age, Bartlett Cove did not exist. The area was a broad sandy valley with braided rivers. The Huna Tlingit called it S'e Shuyee -- "Land at the End of the Glacial Silt." The village L'eiwshaa Shakee Aan ("Town on Top of the Sand Dune") sat on the Bartlett River, not a shoreline -- the nearest ocean was 5-6 miles south near Point Gustavus. Around 1750, the Grand Pacific Glacier bulldozed all that material out and down Sitakaday into the ocean. In retreat by 1879, cold ocean filled the empty trough. The Tlingit's new name became Sit' Eeti Geeyi -- "The Bay in Place of the Glacier." The two names document geological processes of each era.</p>
<p><strong>Tlingit place names as geological evidence:</strong> Unlike English names honoring obscure politicians, Tlingit toponyms give clues to pre-1750 geomorphology. The clear-water Gaathéeni ("The Sockeye Salmon's River") wound from lakes in the Beartrack hills -- salmon would not spawn in silty rivers, confirming it drained from mountains, not a glacier. A Kaagwaantaan oral history celebrates trader Kaakex'wti whose copper wealth convinced the village to harvest nearby trees -- confirming forests existed, corroborated by dating of large interstadial stumps visible in the intertidal zone.</p>
<p><strong>Interstadial stumps:</strong> Head south along the beach toward "Halibut Point" (58 deg 27'3" N, 135 deg 54'0" W) to see 300-year-old stumps that look like old pilings buried in the sand.</p>
<p><strong>Famously flat Gustavus:</strong> Cooper's Notch was a low point in the Grand Pacific's terminal moraine through which a gigantic outlet river formed the Gustavus outwash plain -- second largest flatlands in Southeast Alaska after Yakutat. Gloria Milsap recalled skiing on "small mountains of ice encased in sand" -- debris-covered remnants that can last decades. When they melt, they leave water-filled "kettles." Blackwater Pond is a classic example.</p>
<p><strong>Post-glacial rebound:</strong> The land rises ~1.25 inches/year. The 1950s boat dock is no longer accessible at low tide. The Beardslee Cut will become impassable by ~2050.</p>
<p><strong>Rainforest and intertidal life:</strong> Beautiful life clings to docks -- 3-foot-tall giant plumose anemones, crabs, occasional giant octopus, endangered sunflower sea stars. Black bears with white chest patches roam the cove. Watch for moose, porcupines, sooty grouse, and herons on the trails.</p>`,
  dangers: `<p><strong>Beardslee Cut timing:</strong> Needs 10.3+ feet of water (11 feet recommended). Enter 30 minutes before peak high tide and return no later than 30 minutes after. Miss the window and you wait 12-25 hours. Due to glacial rebound (~1.25 inches/year), by ~2050 the Cut will be impassable during daylight.</p>
<p><strong>Tour boat punctuality:</strong> The daily tour boat departs promptly at 7:30 AM -- deliver gear and kayak by 6:30 AM for loading. Set two alarms.</p>
<p><strong>Big waves at Lester Point:</strong> One of the roughest spots in all of Glacier Bay. Waves from Icy Strait hit from multiple directions while Sitakaday's strong currents shear everything into pointy-peaked frothy nastiness. Only advanced paddlers at slack tides. The Park Service does not encourage this route.</p>
<p><strong>Bears:</strong> Visit the campground daily -- keep food controlled. Bear-proof caches provided.</p>
<p><strong>Gear check:</strong> Test kayak seaworthiness here before committing to the backcountry. Frayed bow lines, broken rudders, missing hatch covers have all stranded paddlers 40 miles up bay.</p>`
},

  summary: `Only expert paddlers should navigate Sitakaday. The narrows funnel ~275 billion cubic feet of water (2 cubic miles) every 6 hours, generating 4-5 foot standing waves during spring tides that suck even the Rush Point buoy underwater. Currents of 5-7 knots are normal at peak flood and ebb. The Park Service discourages kayaking here -- even at slack tide, the water shears, stirs, and boils audibly like a giant river with rapids. Making headway against these flows is impossible, as Muir and countless others have proven. If crossing the channel, consider a dry suit and personal locator beacon as necessary precautions. Cross north of Strawberry Island but expect strong rips between Strawberry and Sita Reef and again near Berg Bay.<p></p>Not scared? Experienced paddlers who can read water will find it satisfying -- enter and exit with the tide, paddle near slack. An intermediate can manage if winds and waves cooperate at slack. The payoff? Primo humpback whale watching -- this is "whale waters" (36 CFR 13.1174, strictly enforced) with a 20-knot speed limit that drops to 13 knots during high whale activity. In August, up to 600 Steller sea lions congregate at Point Carolus, and year-round populations of 2,000+ individuals lounge on South Marble Island. If uncertain, skip Sitakaday entirely via the Beardslee Cut or the daily tour boat.<p></p>Snow (Whale #68, 1957-2001), a pregnant humpback well known in both Glacier Bay and Hawaii, was killed by a Princess Cruise Lines collision. Her 3,729-pound, 161-bone articulated skeleton rests at Bartlett Cove, partially funded by a settlement with the cruise line. At the 2014 dedication, she was honored with a T'akdeintaan Clan spirit ceremony and the name Tsalxaan Tayee Yaay -- "Whale beneath Mount Fairweather."`,
  history: `<p><strong>"Discovery" of Sit-a-da-kay:</strong> Pronounced "Sit-TOCK-uh-day" by locals. The Tlingit name Sit' Eeti Geeyi means "The Bay in Place of the Glacier." Muir originally penned it "Sitideka," then "Sita-da-ka" (1891), then "Sit-a-da-kay" (1915). The US Coast and Geodetic Survey chose "Sitakaday" in 1942, briefly labeling it "Ripple Narrows" (1940-1942). Harry Fielding Reid named Rush Point in 1896 "because there is a ceaseless rush of tidal water flowing past the point" -- but later mapmakers put Rush Point on the wrong side of the channel.</p>
<p><strong>Pre-glacial Tlingit heartland:</strong> Before the Little Ice Age, Sitakaday did not exist. The Lower Bay was a mostly flat outwash plain spanning from Berg Bay to Beartrack Cove and down to Gustavus and Point Carolus -- ~150 square miles. The Huna Tlingit flourished here despite harsh conditions, migrating rivers, earthquakes, tsunamis, and jokulhlaups. Oral histories suggest conflicts with other peoples made this challenging land preferable to easier but more populated regions south. A summer fishing community lined the Chookanhéeni (Grassy River) from Berg Bay past Rush Point to Point Carolus. Around 1750, the Grand Pacific Glacier bulldozed all sediments and villages into Icy Strait, then rapidly retreated, allowing ocean to fill spaces formerly occupied by ice, rock, and communities.</p>
<p><strong>First explorers -- a parade of misfortune:</strong> Vitus Bering sailed past the outer coast in 1741, naming Cape St. Elias. His naturalist Georg Steller gave his name to the sea lions that chase kayaks through Sitakaday and the jays in the Lower Bay forests. Chirikov's ship St. Paul landed on Chichagof Island -- the first known Europeans in Southeast Alaska -- but lost all longboat crews (perhaps to currents, perhaps adopted by locals per Tlingit oral histories, or perhaps killed per a T'akdeintaan account). Cook sailed past in 1778, misnamed "Mount Fairweather" on a rare sunny day. His navigator was William Bligh (yes, Mutiny on the Bounty) who later rowed 3,749 nmi across the Pacific with only a quadrant and compass. La Perouse lost 21 men (20% of his crew) to tidal currents at Lituya Bay in 1786 despite warning his men to steer clear.</p>
<p><strong>Vancouver and Whidbey (1794):</strong> Lieutenant Joseph Whidbey launched from Vancouver's HMS Discovery and camped at Point Carolus, becoming the first non-Native to see Glacier Bay waters. The Whidbey Passage bears his name.</p>
<p><strong>Wood beats Muir (1877):</strong> Army Lieutenant Charles Erskine Scott Wood paddled up Sitakaday two years before Muir, reaching the Grand Pacific terminus. A shaman told him: "You are the only white man that has ever been here." Wood neglected to mention this for five years, letting Muir claim the glory. Eliza Scidmore summarized: "Lieutenant Wood was the Lief Ericson, Mr. Muir the Columbus." Wood later became friends with Mark Twain, John Steinbeck, Charlie Chaplin, Chief Joseph, and a young Ansel Adams. Competitors John Brady (claiming 1878) and Dick Willoughby (also claiming 1878) are widely discredited.</p>
<p><strong>Muir and Young (1879):</strong> Muir, Samuel Hall Young, and Tlingit guides Toyatte and Kadachan paddled into Sitakaday in October -- the rainiest month. The Tlingit crew tried to mutiny, concerned about Muir's unhealthy fascination with storms and icebergs, but Muir's rousing speech convinced them onward. His "glacier gospel" essays put Glacier Bay on the map.</p>
<p><strong>The SS Ancon:</strong> In 1884 Scidmore grumbled that icebergs tore apart its paddle wheels. In 1886 Captain Carroll struck Ancon Rock at Point Gustavus; a 15-foot gash flooded the hold. Passengers spent 20 days on a beach playing cards and interacting with the Huna Tlingit while waiting for rescue. After repairs in Juneau and San Francisco, the Ancon sank for the last time in 1889 on its way home from Glacier Bay. Passengers included the Governor of Colorado and painter Albert Bierstadt, whose famous painting of the wreck hangs in the Boston Museum of Fine Arts. Critics credit the near-drowning for Bierstadt's turn toward gloomy paintings and eventual bankruptcy.</p>
<p><strong>The Wayanda (1868):</strong> The first US vessel to enter the bay after the Alaska Purchase. When Tlingit approached in canoes to offer help, the armed ship refused and fired howitzer rounds at icebergs. Nearly sank from iceberg collisions before the tide rose. Her crew of 41 were perhaps the first non-Indigenous Americans to enter the bay -- useful evidence during Alaska boundary disputes with Canada.</p>`,
  naturalHistory: `<p><strong>Whale's earwax and collision science:</strong> After Snow's 2001 death, cetologists counted waxy growth rings in her ears. Because scientists had observed Whale #68 from a very early age, her deposits confirmed one ring per year, dating her birth to 1957 and establishing that humpbacks live ~50 years on average -- double what many assumed, on par with elephants and humans. A pioneering 2001 study examined every known whale-vessel collision worldwide: 89% of severe injuries or deaths occurred above 14 knots (humpback top speed). No severe injuries below 10 knots. Glacier Bay's 13-knot limit has been one of its most successful regulations. When a whale is within 1/4 nautical mile, vessels must slow to 10 knots. These whale regulations are superior to just about any others in the world, maintained despite intense cruise ship lobbying.</p>
<p><strong>Fjord formation -- deep time:</strong> Glacier Bay's fjords predate the Little Ice Age by over 21,000 years, carved during the Last Glacial Maximum (Wisconsin Glaciation) when the Cordilleran Ice Sheet reached its zenith. Massive glaciers followed fault lines to excavate the East and West Arms, then traveled out through Sitakaday into Icy Strait, merging with more ice coming from the east, turning west through Cross Sound, and advancing 20 miles offshore to the edge of the continental shelf. This ended 10,000-14,000 years ago. A series of smaller advances and retreats occurred between 1,400 and 9,000 years ago, alternately removing and refilling fjords with sediments. The final Little Ice Age (roughly 1200-1900 AD) plowed away the sediments filling Sitakaday but was of comparatively minor geological significance -- in some parts of Muir Inlet and the West Arm, the short-lived Little Ice Age glaciers never reached the bedrock foundation shaped during the earlier Wisconsin.</p>
<p><strong>Sea lions:</strong> Steller sea lions congregate at the bay entrance, drawn by fish migrations funneling through the narrows. In August, up to 600 gather at Point Carolus. On South Marble Island, year-round populations of 2,000+ lounge on rocks -- fantastic news for an animal only recently delisted as endangered. Some aggressive 1,000-pound males give chase to kayakers, making loud unexpected snorts just feet behind. On rare occasions they bump kayaks from underneath. Talk politely and move into dense shallow-water kelp where they may not pursue.</p>
<p><strong>Abrupt bathymetric change:</strong> Near Willoughby Island the bay dramatically shallows from north to south. Water constricts not only side to side (the narrows) but also from the bottom, creating ripping, bubbling upwellings that interrupt otherwise calm paddling.</p>`,
  dangers: `<p><strong>Tide rips and currents:</strong> 5-7 knot currents at peak flood and ebb generate 4-5 foot standing waves during spring tides. The 2024 US Coast Pilot warns of "heavy tide rips and swirls abreast Beardslee Islands" with ebb currents setting across the bay and meeting direct currents on either side of Willoughby Island, producing "heavy swirls and rips during large tides." Making headway against these flows is IMPOSSIBLE -- in 1935 Fred Matson could not advance his 28-foot cabin cruiser against the ebb. Muir and countless others proved the same.</p>
<p><strong>Standing waves and whirlpools:</strong> Even at slack tide the water shears, stirs, and boils audibly. Point Carolus has dangerous whirlpools and a reef posing hazards -- only tackle at slack tide. At low-tide slack, paddle carefully between the reef and shore for protection from the worst currents.</p>
<p><strong>Heavy traffic:</strong> Charter boats, fishing trawlers, yachts, law enforcement, the daily tour boat, mega-tour vessels, and cruise ships pass through daily, most noticeably in the morning. Stay alert when crossing.</p>
<p><strong>Sea lions:</strong> Curious Steller sea lions lurk everywhere. Keep the mandatory 100-yard distance, especially at Point Carolus. Tricky along Lester and Young Islands where that distance can put you in dangerous rips. Aggressive 1,000-pound males sometimes give chase or bump kayaks. Move into shallow kelp forests if harassed.</p>
<p><strong>Whales:</strong> Park Service requires 1/4 mile minimum distance from humpbacks. If worried about proximity, thump your kayak or splash with your paddle -- they have great hearing but no sonar.</p>
<p><strong>Fresh water scarce:</strong> East side: bring your own. Only south Strawberry Island has a semi-reliable source. West side: reliable water at Ripple Cove, less reliable north of Rush Point. Point Gustavus: small stream 0.75 miles east. Point Carolus: tide-flooded Carolus River 1 mile west.</p>
<p><strong>Alternative:</strong> Use the Beardslee Cut from Bartlett Cove or take the daily tour boat to skip Sitakaday entirely.</p>`
},

  summary: `Nowhere else in Glacier Bay offers such consistently calm and peaceful waters -- a perfect destination for beginners with no big waves, no cruise ship channels, no open water, and safe landings just about everywhere. From May 1 to September 15, park regulations prohibit motorized vessels, keeping this labyrinth of roughly 40 islands blissfully serene. Wildlife is extraordinary: harbor seals, sea lions, humpback whales rubbing on shallow reefs, huge rafts of hundreds of sea otters, moose, porcupines, wolves (mostly tracks), black bears swimming between islands, and an astounding array of seabirds including pigeon guillemots, Pacific loons, harlequin ducks, Caspian terns, and large colonies of kittiwakes and glaucous-winged gulls around Eider Island.

<p>Wildflowers rank among the best in the park: lupines, Indian paintbrush, cow parsnip, silverweed, shootingstars, chocolate lilies, strawberries, dwarf nagoonberries, northern starflowers, red columbine, yarrow, pink wintergreen, and the intensely aromatic white bog orchid -- "if bottled, would command the highest price of any perfume in the world." Best displays arrive late June to early July. Push through the denser shoreline brush into 200-year-old Sitka spruce rainforest dripping with lichens, ferns, and spongy moss floors. Eight islands and reefs are off-limits for ground-nesting birds, but with roughly 40 islands this in no way limits exploration.</p>

<p>Don't expect dramatic glaciers or nearby peaks -- the showy glaciers are 60 nmi further north and these pancake-flat islands barely warrant a contour line. Aptly named Flapjack Island personifies their character. With 20-25 foot tides, low-lying islands mean whopping intertidal zones; low-tide gear hauls can be a grueling slippery marathon. But the tidal pools become increasingly enchanting -- small skittering crabs, colorful sea worms, trapped jellyfish, and strange creepy crawlies. The Tlingit called one island Kadigoono X'aat' -- "Island That Has Spring Water." Most campsites are dry -- arrive with all the water you need.</p>`,
  history: `<p><strong>Captain Beardslee (1880):</strong> US Navy Captain Lester A. Beardslee explored and charted the Lower Bay in 1880 on the steamship Favorite, reporting in Affairs in Alaska (1882). On page 71 he names "Glacier Bay" -- "A deep bay, named by me, Glacier Bay, which is not on the chart, penetrates the northern coast of Cross Sound... This bay is 35 miles deep, and at its head are five immense glaciers." One wonders if he appropriated the name from the Huna Tlingit, who similarly called it Sit' Eeti Geeyi -- "Bay Replaced By Glacier."</p>
<p><strong>Scidmore defends Beardslee:</strong> Eliza Scidmore wrote in her 1896 National Geographic article that Beardslee fought the Coast Survey to retain his "very apt name" rather than letting them honor "some inconsequential and now forgotten statesman."</p>
<p><strong>Beardslee's character:</strong> As the ranking military figure in Southeast Alaska (1879-1880), his accomplishments included negotiations with Chilkat Chief Kloh Kutz -- without Chilkat consent to cross Chilkoot Pass, the Klondike Gold Rush would have had a far more contentious history. Under the pseudonym "Piseco," he wrote to Forest and Stream magazine bemoaning his exile and pining for luxuries. He treated the Tlingit with a mix of respect and deep bias.</p>
<p><strong>Fox farms:</strong> Remnants of a Russian-American industry importing Arctic foxes to the Aleutians in the late 1800s. The 1920s fox-fur craze reached Southeast Alaska -- farmers transplanted snow-white foxes onto islands requiring no fencing. Few made money; the craze collapsed with the Great Depression. A fascinating cabin remains on Fox Farm Island's southeast side (roof caving in, vacuum tube radio, old deck of cards, two spring box beds, bear claw marks outside; an outbuilding 100 yards west has fox-pelt drying racks). The Park Service maintains a "benign neglect" policy.</p>
<p><strong>Stolen names -- Scidmore Island:</strong> W.S. Cooper dubbed it Strawberry Island in 1923, inadvertently stealing the name from Eliza Scidmore, who wrote in 1885 that the island belonged to her: "The captain and the pilot made me an unconditional present of the domain." Using the geodetic datum of her time (matching Reid's 1896 map), her coordinates sit on today's Strawberry Island. The Tlingit name was L'awx'aat'i (Glacial Sand Island).</p>
<p><strong>Samuel Hall Young's stolen glacier:</strong> Muir's companion lamented: "Without consulting me Muir named this Young Glacier, and right proud was I... but later maps have a different name. Some ambitious young ensign on a surveying vessel, perhaps, stole my glacier... certainly it ought to be ranked as a felony of the first magnitude, the grandest of grand larcenies."</p>`,
  naturalHistory: `<p><strong>Epic precipitation:</strong> Beardslee kept detailed 16-month records (June 1879-Sept 1880): rain 1,806 hours; mist/fog 1,077 hours; snow/hail 835 hours; 100% overcast 4,265 hours. He insisted it "only" rained 21%. In reality, some form of wetness fell 42% of the time, with clouds 96% of the time.</p>
<p><strong>Why so much rain?</strong> Storms form in the North Pacific east of Japan, take a 4-6 day moisture-building journey, and slam into the Fairweather and Saint Elias Ranges. Stymied, they stall and die -- "lysis." The Gulf of Alaska has one of the highest lysis densities in the world. The Fairweather Range has the steepest ocean-to-summit rise of any mountains in the world, generating 55-70 feet of annual snowfall on the Brady Icefield.</p>
<p><strong>Intertidal zones:</strong> High zone: periwinkles, barnacles, limpets, beach hoppers, tiny red velvet mites that swarm beaches but only eat kelp flies (smooshing them stains fabric), and pseudoscorpions waving pedipalps "like angry boxing gloves." Middle zone: blue mussels, yellow rockweed, dogwinkles, colorful chitons, ribbon worms, three-foot mussel worms (turn angry red when mating), mottled sea stars in orange, yellow, tan, blue, green, and purple. Low zone wins biodiversity -- brown algae, sea urchins, pricklebacks, sculpins.</p>
<p><strong>Kelp forests:</strong> One of the largest kelp beds in Glacier Bay dominates the northwest corner. These arrived after sea otters in 1995 -- otters consume urchins that would otherwise devour kelp. Bull kelp grows up to six inches per day, reaching 100 feet long. Kelp is not a plant but a "thallus" -- algae-based, like mushrooms of the sea. During windstorms, paddle through kelp thickets instead of open water for calmer seas.</p>
<p><strong>Giant barnacles:</strong> Glacier Bay may host the world's largest barnacles -- up to eight inches in diameter, found in deeper waters and in the Northern Cut shallows.</p>`,
  dangers: `<p><strong>Beardslee Cut timing:</strong> Navigable 1-2 hours before and after high tide. Minimum: 10.3 feet (for the brave); 11 feet strongly recommended. Due to glacial rebound (~1.25 inches/year), by ~2050 the Cut will be impassable during daylight on most days.</p>
<p><strong>Northern Cuts -- choosing an exit:</strong> At high tide, use the northernmost cut (58 35'13" N) -- barely navigable at 11.3 feet. At mid tide, use the first passage west (58 35'0" N) at ~9.5 feet. At any tide, a passage between Flapjack and closed shoals works but is choked with dense bull kelp. A southeastern exit on Trails Illustrated (58 34'9" N) is now a portage (victim of isostatic uplift). All passages get shallower by ~1 foot per decade.</p>
<p><strong>Beardslee Entrance currents:</strong> Tidal rips rush audibly through the Beardslee Entrance (west side -- different from the Beardslee Cut). Beginners should avoid, especially during ebb.</p>
<p><strong>Secret Bay entrance:</strong> Strong currents at the northwest entrance, OK for beginners only at slack tide.</p>
<p><strong>Hutchins Bay waves:</strong> Gets choppy when ebbing tide meets southerly wind; stick to the southeast coastline.</p>
<p><strong>Dry campsites:</strong> Most islands have no freshwater. If desperate, look along Hutchins Bay mainland -- a small lake outlet (58 33'8" N, 135 52'9" W) and a small river (58 32'36" N, 135 50'40" W) are most reliable.</p>
<p><strong>Black bears:</strong> Swim between islands regularly hunting bird eggs. Keep a clean camp and make noise on forest trails.</p>
<p><strong>Closed islands:</strong> Eight Beardslee Islands and reefs are off-limits to protect ground-nesting birds. Stay at least 100 yards away.</p>`

  summary: `Most folks blast past Beartrack Cove at high speed headed for the same busy glaciers as everyone else. Their loss. With generally calm waters and little motorized traffic, this out-of-the-way corner has a wonderfully laid-back vibe with great sunsets and even better rainforest hiking. The east end has an outstanding array of harlequin ducks, eagles, buffleheads, mergansers, loons, surf scoters, and more -- one of the best seabird-watching spots in the park. Paddle quietly toward the Beartrack River outlet and drift -- the birds gossip on half-submerged logs, and if lucky, a brown bear stands up in the grass behind.

<p>The actual "bear tracks" are two small islands along the northern shore, neatly placed like round footprints in the water. At low tide they attract seabirds; at high tide, paddle behind them in the well-protected passage. At high tide, a small branch of the Beartrack River is navigable for a quarter mile through tall dense grass -- a charming and completely different little expedition.</p>

<p>Muir wrote in 1890: "The clearest way into the Universe is through a forest wilderness." With over 200 years of growth, the lush forests on the southeast side are among the finest temperate rainforests in the park -- push through dense shoreline bushes into Sitka spruce dripping with mosses, lichens, and ferns. Fresh water from the Beartrack River and two converging streams at 58 36'45" N, 135 54'11" W. A small pretty waterfall west of Beartrack Island disappears in dry years.</p>`,
  history: `<p><strong>Park boundaries -- Dixon's vision:</strong> The original Glacier Bay National Monument (est. 1925) did not include Bartlett Cove, beginning along a line between Geikie Inlet and Beartrack Cove. Everything changed when naturalist George Wright and biologist Joseph Dixon revised NPS wildlife management policies with ecological considerations foremost. Dixon concluded that Beartrack Cove and the Bartlett River form a single brown bear habitat, describing the system as "the greatest combination of examples of glacial history, plant and animal ecology and struggle for existence to be found in one place anywhere in Alaska."</p>
<p><strong>Decade of bureaucratic struggle:</strong> After years of negotiations, President Roosevelt finalized the new boundary in 1939, extending the monument to Point Gustavus and west across the Fairweather Mountains. But the expansion struck a "deceptive bargain with the devil" -- the Department of the Interior stayed silent about mining activities, and scrapped the planned Admiralty Island National Park, handing it to Tongass for clear-cutting.</p>
<p><strong>WWII logging threat:</strong> Consulting with regional forester B. Frank Heintzleman, the military built a massive storage depot inside the monument using locally sourced old growth. Chainsaws fired up at Excursion Inlet in 1942. A B-29 airstrip was paved in the middle of the monument (now part of Gustavus). Plans moved forward to harvest all of Bartlett and Beartrack forests -- fortunately the Aleutian Campaign ended and war efforts shifted elsewhere, sparing Dixon's prized bear habitat.</p>
<p><strong>Eisenhower and final park creation:</strong> In 1955, Eisenhower made boundary adjustments excluding Gustavus homesteads and the airstrip, partly to appease Heintzleman, whom he'd handpicked as Alaska's Territorial Governor in 1953. The park was finally established in 1980 by President Jimmy Carter. It took 50 long bureaucratic years, but except for old growth at Excursion Inlet and the town of Gustavus, Dixon's ambitious vision came to almost full fruition.</p>`,
  naturalHistory: `<p><strong>Landslide escarpment:</strong> An impressive escarpment runs along the northern shore above Beartrack Island. After glaciers receded and removed lateral support, this mountain slope slumped into the water, creating islands and shoals where landslide debris piled. On the mainland, bare rock cliffs remain as evidence. On nautical charts, look for the shallow green linear zone; at low spring tides, the shoal nearly connects the two islands.</p>
<p><strong>Future slide potential:</strong> Smaller slides could follow, especially if heavy rains and snowmelt saturate nearby soils. Continued isostatic rebound could exacerbate this by changing internal stresses. The danger is slim, but nasty precedents exist elsewhere (Lituya Bay, Lamplugh Glacier). In almost every respect except volcanoes, Glacier Bay's geology ranks among the most active in the world -- earthquakes, landslides, glaciers, mountain building, alluvial erosion, avalanches, and rebound.</p>
<p><strong>Rainforest:</strong> With over 200 years of growth since glacial recession, the southeast-side forests are among the finest temperate rainforests in the park. Wildlife trails -- especially bear trails -- wind through the interior.</p>
<p><strong>Birding hotspot:</strong> The eastern end is one of the best seabird observation sites in the park -- harlequin ducks, bald eagles, buffleheads, mergansers, Pacific loons, surf scoters, and all gull species. Endangered Kittlitz's murrelets fish offshore near the northwest entrance.</p>`,
  dangers: `<p><strong>West/northwest winds:</strong> Can slam Beartrack with big swells, though generally this cove stays calmer than the larger and more open Mid Bay.</p>
<p><strong>Rare rips:</strong> Once in a blue moon, rips near the northeast side (well offshore) unexpectedly appear -- use caution and go around.</p>
<p><strong>Submerged rocks and shoals:</strong> Many barely submerged rocks on the west side, especially rounding toward Flapjack Island. Hazards extend further into the cove than expected. One particularly nasty rock sits just east of the Northern Cut -- by the time you see it, it's too late. Beartrack Island has exceedingly shallow shoals; at low tide, approach from the north.</p>
<p><strong>Bears at the river:</strong> The Tlingit name Gaatheni Tlein means "The Big Sockeye Salmon's River" -- watch for brown bears during the salmon run.</p>
<p><strong>Tidal flats:</strong> The head of the cove is sensitive bird habitat and brown bear country, with terrible muck at low tide. Camp at least a quarter mile west.</p>`
},

  hiking: 'Relationship destroying — don\'t bother except along beaches or on Sturgess Island',
  summary: `A stunning but oft-snubbed coast that most folks see only in their rearview mirror while chugging furiously northward toward glaciers. The tantalizing promise of ice propels kayakers from the Beardslees to distant Muir Inlet -- a ridiculously long and probably doomed but common paddling plan. But combined with the Beardslees and Beartrack Cove, the eastern shores of the Mid Bay warrant a complete five-day trip, a coast practically guaranteed to overflow with rare Kittlitz's murrelets, puffins, cormorants, gigantic smelly Steller sea lion colonies, whales, black bears, beautiful cliffs, a chain of extra-cool islands (Sturgess, Puffin, Leland), fantastic rainforest, and solitude that's more difficult to find in the Upper Bay. Note: The most recent Trails Illustrated map (2019) shows a permanent closure to overnight use due to high bear concentrations, but the park lifted that restriction many years ago -- this area is open for business.<p></p>For those OK with long open water crossings, do not miss spectacular South Marble Island. Closed to camping and with a 100-yard approach limit, the undisturbed Steller sea lion colonies are second to none -- a loud, grunting, blubbery, odiferous, jostling pile of closely stacked and gigantic carnivorous pinnipeds. Spend an hour watching them scramble, push, shove, bellow, and fall off cliffs with tremendous splashes before waddling back up with their strong but awkward flippers. When the aroma becomes unbearable, drift to the central part of the island where roosting pelagic cormorants and kittiwakes make a fuss above, and both horned and tufted puffins swim below. Some birders travel to Alaska just to see this isolated rock.<p></p>For stunning verticality, the Rat Cliffs south of Spokane Cove compare favorably with other large cliffs in the park but with fewer visitors. The columbine, goat's beard, fireweed and other flowers and ferns dangle from terraces. Barn swallows nest at the north end, warblers hide in alcoves, woodpeckers flit between trees, and marbled murrelets congregate below. The mineral-rich quartz veins in the cliffs hide gold.`,
  history: `<p><strong>Murderous York:</strong> York Creek honors William York, the 1890 camp assistant for geophysicist Harry Fielding Reid, with whom he spent the month of July at Muir Point. Why York deserves such a tribute is mystifying. Hoping to prospect the bay and strike it rich, York instead despised camp life and found it "confining" according to Reid. On August 1 he switched to John Muir's employment, but Muir's campsite was only about 20 feet from Reid's, so why this was an improvement remains a mystery. His new job didn't last long. Shortly after blowing a fuse and threatening to kill Muir, York resigned and set off solo to hike up and over the Takhinsha Mountains to Pyramid Harbor near Haines. From Reid's journal: "Prof. Muir had a rough experience with York. York followed him apparently with the intention of shooting him, but the Professor kept out of his way, and came back some fifteen hours ahead of him." York's plan to hike 65+ miles over the Adams Glacier, up the Main Valley, across the Endicott Gap, east to the coast, and north to home qualifies as insane even with today's maps, technology, and lightweight gear. Nobody knows if York completed the journey, but it's doubtful.</p>
<p><strong>The epic rodent (Kuts'een Gil'x'i / Rat Cliff):</strong> In Tlingit, the impenetrable stretch between York and Spokane goes by the name Kuts'een Gil'x'i, or Rat Cliff. Rather than describing a plague of rats, this references a single rodent of epic proportions who stole a Tlingit maiden, stashing her away in his cliff lair. The maiden's offended brothers scaled the cliffs and freed the young woman in a heroic rat-versus-man battle that slayed the evil kidnapper in a Nutcracker-like climax (see Thornton, 2008). This Chookaneidi Clan story will forever change the way you look at these cliffs -- that's the point behind Tlingit place names. You can't forget places or histories that come with good stories, and with no written records, the Tlingit relied on memory.</p>
<p><strong>The threat of roads:</strong> To increase visitation, overenthusiastic politicians occasionally suggest roads extending far into Glacier Bay's mountains. The most promising (or disastrous) proposal requested an asphalt extension from Bartlett Cove to South Sandy Cove, pushed primarily by former Alaska Governor and Senator Ernest Gruening (1887-1974) who hoped for massive lodges and major tourist development. In theory this dovetailed with Park Service plans for a small backcountry tourist center, but park administrators preferred boat access only and abandoned cove development in favor of intact wilderness. Gruening never gave up, pitching again throughout the 1960s, but the area's wilderness character -- and later the official wilderness designation -- nixed his scheme. A second Gruening road proposal would have wound over Endicott Gap into Adams Inlet but met a similar fate under opposition by the Park Service for disrupting prime wilderness habitat and because there was little public support in either Haines or Gustavus.</p>
<p><strong>The cruise ship bargain:</strong> To derail road and lodge plans and foster political support for official wilderness designation, Park Superintendent Robert Howe (1969-1975) promoted a marine highway system of cruise ships and tour vessels within Glacier Bay. His hope was that regular cruises would ease political pressure for chalets, concessions, and gift shops. It worked, perhaps too well. By 1975, dozens of daily cruise ships had become the primary route into the park, revisiting the halcyon days of 1890s Muir Glacier tourism, but now with squash courts, jewelry stores, and everything that would drive Muir insane. At best, this swap has been a Faustian bargain. Cruise ships and tour vessels dominate the visual and aural environment, especially in the West Arm. Year after year, backcountry camper surveys show constant frustration and barely simmering anger with cruise ship traffic and huge tour vessels that belch noisily through key areas like Tarr Inlet. Much to his credit, Howe later worried that corporate interests -- the cruise ship industry in particular -- exerted undue influence on park management; by the early 1980s he argued that the bay's vessel traffic needed restrictions.</p>
<p><strong>Tidal cut between the Sandy Coves:</strong> A nifty tidal cut between North and South Sandy Coves floods at 12.5 feet. The south side is a horrible muck-filled mess, so don't push your luck. On older nautical charts, "Shl to bare rep 1992" indicates a report that this was bare rock and shoal in 1992. With glacier rebound, the tidal cut has lifted another three feet since that time.</p>
<p><strong>Huna Tlingit presence:</strong> As late as 1946, two salmon smokehouses sat near North Sandy Cove, as described by Albert Greenwald, a T'akdeintaan Clan member of the Huna Tlingit who testified about his land rights in Glacier Bay. No evidence remains. The Tlingit name for the river in Spokane Cove is Guchheeni, which translates as Wolf Creek -- a rare instance when the Anglo-assigned name matches the original.</p>`,
  naturalHistory: `<p><strong>Murrelets -- a global hot spot:</strong> This coast is a local murrelet hot spot thanks to easy access to both old-growth forest and the high peaks of the Beartrack Mountains. The globally endangered but locally abundant marbled murrelets (pronounced MER-lits) and the "near threatened" Kittlitz's murrelets both thrive here. The Kittlitz's murrelets live only along the Alaskan and East Siberian coasts, and oddly prefer nests on high isolated mountaintops sometimes 50 miles or more from shore -- a peculiar twist for a seabird. The endangered marbled murrelet prefers nesting in old-growth trees, which sadly contributes to its endangered status as Tongass National Forest managers continue to saw through the rainforests of Southeast Alaska. Glacier Bay avoided the worst of extractive industries, making this section accessible to both highly desirable nesting habitats.</p>
<p><strong>Murrelet identification and numbers:</strong> Telling summer-plumage Kittlitz's from marbled murrelets can stump even experts. The Kittlitz has a slightly smaller bill, but the easiest distinguishing characteristic is the white tail visible as the Kittlitz flushes -- meaning positive identification often comes at the very moment they fly out of sight. This might be the only place in the world where you can observe enough murrelets of both species to learn the difference. Surveys suggest roughly 5,000 Kittlitz and 60,000 marbled murrelets throughout Glacier Bay, or roughly 25% of the world's entire marbled population; but numbers vary wildly year to year, month to month, and by location. June has the lowest summertime numbers (breeding murrelets on nests during incubation), so if these rare birds are a priority, visit in mid-July. Multi-year scientific surveys indicate murrelets are most abundant in Rendu Inlet, south of Russell Island, Hugh Miller Inlet, Ice Valley, Muir Point, Reid Inlet, Johns Hopkins, and the Beardslee Entrance, though they show up everywhere. The scientific "type specimen" for the marbled murrelet was collected by Captain Cook on his 1778 expedition past the outer coast of the park and now resides in the Natural History Museum in Vienna.</p>
<p><strong>Uranium and gold at North Sandy:</strong> A small gold, silver, and copper prospect about 100 feet above the northeast corner of North Sandy has the dubious distinction of harboring the only known uranium deposits within the park. The amounts are negligible and of no concern. The gold is one of the richer deposits in the bay, assayed at a measly 0.1 ounces per ton, well under the ~0.3 ounces per ton needed to excite investors. Miners worked the site in the mid-1930s when Gustavus pioneers Ruth and Fred Matson paid South Sandy Cove a visit. From Ruth: "The cave formed by their mining was the most beautiful rock formation I have ever seen . . . shot through with peacock blues." She appears to be describing azurite, a stunning, brilliant blue-colored, copper mineral. Barely noticeable from a kayak is a decaying concrete dock, mostly collapsed -- one of the last remnants of the mine. Look near a huge boulder that recently rolled onto the shore, shattering large trees as it crashed down the mountain. The boulder is more impressive than the dock.</p>
<p><strong>South Marble Island wildlife:</strong> South Marble Island hosts undisturbed Steller sea lion colonies, roosting pelagic cormorants and kittiwakes, and both horned and tufted puffins swimming below the cliffs. Some birders travel to Alaska just to see this isolated rock. Sea lions sometimes haul out on North Marble Island as well. Sea otters, scoters, and harlequin ducks are common around the Sturgess Islands.</p>
<p><strong>Sturgess Island interstadial stumps:</strong> On Sturgess Island #2, look for interstadial stumps on the upper end of the beach at the northern tip. Much of the "driftwood" on this island is interstadial as well -- ancient wood from forests that were buried and then re-exposed by glacial retreat.</p>
<p><strong>Leland Island bird closure:</strong> The park prohibits camping on the south side of Leland Island during summer months (May 1 to August 31) to protect high concentrations of ground-nesting birds.</p>`,
  dangers: `<p><strong>Bears, bears, bears:</strong> This coastline tilts toward ursine insanity. Bears are excellent swimmers and visit every island in the bay. In 1980, a black bear in South Sandy Cove killed a camper, but with a maximum lifespan of 30 years, the current population has no memory of the days before bear canisters were mandatory. With a clean camp and bear canisters opened only in the intertidal, you'll be fine. Bears are especially concentrated around York Creek and Wolf Creek (inner Spokane Cove), and black bears hold regular beach parties at South Sandy Cove. Check very carefully for recent bear activity -- mark trails, fresh scat, and ubiquitous salmonberries that attract both hungry humans and bears.</p>
<p><strong>South Marble Island (100-yard approach limit):</strong> Closed to camping. Steller sea lions are loud, blubbery, enormous carnivorous pinnipeds. Keep your distance. The strong smell alone may knock you out of the kayak.</p>
<p><strong>North and South Marble open water crossings:</strong> Only advanced or very confident paddlers should attempt the Marble Islands. Both require an hour of paddling across open, vessel-filled waters that can have large waves. Attempt only on a calm day and expect bigger waves offshore. North Marble sees much less traffic but is easily the most exposed island in the bay. The paddle between North and South Marble takes half an hour. North Marble Island camping involves a terrible landing on jagged boulders (especially at mid tide), full exposure in all directions, and potential multi-night stranding if wind kicks up. Sea lions may occupy the landing rocks, forcing a retreat. No beginners -- even advanced paddlers could get in trouble during a storm.</p>
<p><strong>Shoaling hazard:</strong> Watch for hidden boulders and shoals along shallow-water shores between Spokane and South Sandy.</p>
<p><strong>Storms and fetch:</strong> A long fetch lets winds from either north or south smash into fast-rising tides, whipping up large surf. If caught by surprise: hole up in North Sandy Cove, South Sandy Cove, or Spokane Cove (in that order). York Creek will work in a pinch but is much less protected. Elsewhere, there's little to no protection -- much of the shoreline is a jagged rocky mess or sheer cliff with no room for emergency landings. Novices should join a more experienced paddler unless the forecast guarantees calm flat water. Intermediate or better paddlers are unlikely to have significant trouble regardless of weather.</p>
<p><strong>Spokane Cove at low tide:</strong> Despite high-tide appearances, Spokane Cove empties surprisingly far at low tide, and almost completely during a spring tide -- a looong expanse of muck. If spending the night, carefully plan the timing of your high-tide exit and prepare for a long gear haul.</p>
<p><strong>Fresh water scarcity:</strong> York Creek has excellent water -- fill up here if heading north. A perennial stream immediately south of the Rat Cliffs (1 nmi south of Spokane Cove) offers reliable water but rocky landings. Wolf Creek in Spokane Cove has fine water but insufferable muck at low tide. Puffin, Sturgess, North Marble, and the Leland Islands are dry. North Sandy Cove has several small streams on the far north side (e.g., 58 deg 44'39" N, 136 deg 0'28" W), though all are far from camps.</p>
<p><strong>Leland Island closure:</strong> The park prohibits camping on the south side of Leland Island during summer (May 1 to August 31) to protect ground-nesting birds.</p>`

  coords: [[58.742,-136.015],[58.755,-136.022],[58.770,-136.032],[58.785,-136.045],[58.800,-136.058],[58.815,-136.070],[58.828,-136.078],[58.832,-136.102],[58.818,-136.105],[58.798,-136.098],[58.782,-136.090],[58.768,-136.085],[58.755,-136.080],[58.742,-136.070]],

  hiking: 'Acceptable — very long beaches, nice woods on northern Garforth Island',
  summary: `Mount Wright marks the beginning of many backcountry trips, just as it did over a century ago when Muir, Reid, Scidmore and company spent summers along these exact shores, exploring and writing beautiful essays eagerly consumed by 19th-century readers looking for vicarious adventure. Today this popular kayaking zone makes a very convenient tour boat drop-off for trips into the East Arm. Many of those 1890s readers of Muir's dispatches to the San Francisco Daily Evening Bulletin rushed northward, fueling an explosion of Glacier Bay steamship tourism. So many sightseers visited Muir Point that the Huna Tlingit renamed it "White Man's Point." Muir's name still draws a small village of kayakers to this corner; but the paddlers spread out quickly, and this is by no means overrun.<p></p>As a gateway to the backcountry, Mount Wright oscillates with Sebree Island on the opposite side of Muir Inlet for the daily drop-off; check the park's summer schedule before committing to an itinerary. Generally, if Wright is the drop-off in early season, then it's Sebree in late summer, or vice versa. Mount Wright has quicker access to the more popular campsites to the north along Muir Point, Point George, and the Forest Creek flats.<p></p>Paddling northward is the near-unanimous choice with access to the McBride, Riggs, and Muir Glaciers. But heading south immediately passes stunning, unforgettable cliffs -- beautifully named Dakhlashu ("Where the Woods End") in Tlingit -- filled with waterfalls that plunge hundreds of feet over a precipice but fail to reach the ocean, disappearing mysteriously into cracks and talus. On a calm day, marvel upward at fireweed and ferns, lichen and moss, and far above, occasional mountain goats perched in irrational positions on absurd walls. With limited time, paddling from Mount Wright to Bartlett Cove (or vice versa) makes a perfect three-night trip: Sturgess Island or Spokane Cove, then York Creek or Beartrack Cove, then the Beardslee Islands. No icebergs and no glaciers, but far fewer people -- the eccentric, more verdant, and quieter route, the path less traveled in Glacier Bay.<p></p>Whales gather for most of the summer along Muir Point, Garforth Island, and the open waters between Garforth and North Sandy Cove. This stretch consistently wins first place for humpback sightings by kayakers. Expect bears (though not the hordes of the nearby Sandy Coves), occasional wolves along Muir Point, and sea otters and scoters around Garforth's southern tip. Later in summer, less-common Bonaparte's gulls join glaucous-winged and short-billed gulls near Muir Point, while roving packs of sea lions snort and play north of Muir Point where the massive Adams Inlet tidal flux shoves tasty treats their direction twice per day. Cruise ships never visit the East Arm, and tour vessels rarely do -- the park plans to officially prohibit cruise ships and tour vessels north of Muir Point (the "Small Vessel Experience"), though "small" means every vessel up to 80 feet.`,
  history: `<p><strong>Camp Muir:</strong> Fueled by popular works by John Muir, Eliza Scidmore, and Miner Bruce, hundreds of tourists steamed to Muir Point. The cabin, built in 1890, housed Muir only briefly but served countless scientists and adventurers after. By 1926, only the chimney remained. The USGS marks official Muir Point incorrectly -- Reid's maps place Camp Muir at a different location.</p>
<p><strong>Muir's first visit (1880):</strong> Ice towered hundreds of feet above the ocean. Mesmerized by icy Gothic cathedrals, Muir wandered upstream through crevasses until well after dark, when he spotted a homing beacon lit by a Tlingit guide on Mount Wright. He told Samuel Young: "I've been wandering through a thousand rooms of God's crystal temple. I was tempted to stay there and softly freeze, until I would become part of the glacier. What a death it would be."</p>
<p><strong>Muir and Young's climbing adventure (1879):</strong> Near Wrangell, Young fell into a couloir and dislocated both shoulders trying to keep up with Muir. During the rescue, Muir pulled Young up the cliff with his teeth -- "the most impossible feat that ever man performed" -- though Muir modestly discusses suspenders and a necktie instead.</p>
<p><strong>Muir and hunting (At Aana / Wildlife Grounds):</strong> Young sent "Hunter Joe" for a goat; he returned with the fattest of 11 killed that day. Muir blew a gasket, turned beet red, and lunged at Joe -- the only time Young ever saw Muir lose his temper.</p>
<p><strong>Contentious seal hunting:</strong> Two Huna in 1963 killed 243+ harbor seals at Garforth Island (Wasus X'aat'i / Cow Island), leaving carcasses along two miles of shoreline, aggravating tensions between Huna use rights and park aesthetics. The Alaskan government provided a seal bounty from 1927 to 1967.</p>
<p><strong>Scientists Reid, Cooper, Field:</strong> Reid arrived in 1890 with H. P. Cushing and four students, taking exacting measurements. Cooper established botanical "quadrats" in 1916; ecologist Brian Buma rediscovered the lost plots in 2016 using metal detectors -- the longest running plant succession study in the world. William Osgood Field began systematic glacier documentation in 1926.</p>
<p><strong>Reid's missed pickup (1892):</strong> "We returned to Camp Muir to find a note saying the Topeka had been there the previous day. This was the last steamer of the season." Thieves had ransacked Muir's cabin. Reid oared 40 miles to flag down the USS Pinta. Lt.-Cmdr. Washburn Maynard returned for the assistant guarding equipment; six years later Maynard fired the first shots of the Spanish-American War.</p>`,
  naturalHistory: `<p><strong>Humpback whales -- the #1 kayaker spot:</strong> With the glacier long gone, the Mid and Lower Bay's decaying rainforests and rivers send vast quantities of nutrients into the water, feeding roughly 150 humpbacks from the "Southeastern Alaska Feeding Herd," migrating 2,800 miles from Hawaii and 2,300 miles from Mexico every summer. They consume 1.7 to 5.9 tons per day of capelin, sand lance, herring, juvenile walleye pollock, and krill. This stretch along Muir Point, Garforth Island, and the waters between Garforth and North Sandy Cove consistently wins first place for humpback sightings by kayakers.</p>
<p><strong>How to spot and identify whales:</strong> Listen for humpback blows (exhalations) and quickly turn your head. Whales make three or so repeat blows before throwing their flukes upward to dive. Every humpback has individualized black-and-white fluke patterns that last a lifetime, akin to fingerprints. Take a photo and search at happywhale.com or ask a whale biologist in Bartlett Cove for the name. Park cetologists know resident whales by heart: Garfunkle (#516, born 1974), Snow (#68, deceased 2001, age 44), Festus (#441, deceased 2016, age 66).</p>
<p><strong>Lunge-feeding and bubble nets:</strong> Humpbacks "lunge-feed" by surging forward, opening gigantic hinged mouths taking in up to 15,000 gallons per gulp. In small groups, they cooperate by blowing "bubble nets" -- swimming under herring and spiraling upward while surrounding fish with a curtain of air. Look for mysterious circles of bubbles on the surface, then wait for whales to simultaneously leap upward through the froth.</p>
<p><strong>Breaching:</strong> Some crazed humpback launches 40,000 to 80,000 pounds of animal out of the water. The associated 50-foot-long crashing BOOM gets everyone's attention. Most cetologists believe it communicates something about food, predators, or desire for sex.</p>
<p><strong>The Blob and population decline:</strong> Park biologists blame a 2014-2018 decline on "The Blob," an infamous 1,000-mile-wide patch of unusually warm water that raised sea temperatures by 5 to 11 degrees F, reducing zooplankton, starving krill, and causing algal blooms. Half of the entire murre population in Alaska -- four million birds -- died as a direct result. Scientists expect The Blob will keep returning -- an entirely unwanted product of climate change.</p>
<p><strong>Small Vessel Experience:</strong> Cruise ships never visit the East Arm, and tour vessels rarely visit. The park plans to officially prohibit cruise ships and tour vessels north of Muir Point, maintaining the status quo with a new label. "Small" means every vessel up to 80 feet. Private superyachts of 80 feet or longer will be prohibited from the entirety of Glacier Bay.</p>
<p><strong>Wildlife around Garforth and Muir Point:</strong> Sea otters and scoters love Garforth, especially at the southern tip. Bonaparte's gulls join glaucous-winged and short-billed gulls later in summer near Muir Point. Roving packs of sea lions frequent waters north of Muir Point. Wolves visit on occasion. Oystercatchers nest on Garforth's beaches. Slugs overrun the boggy grasses of the southern tip -- expect to spend the evening tossing dozens off your tent.</p>`,
  dangers: `<p><strong>Waves and southerly storms:</strong> During a southerly, expect winds and waves from the wide-open fetch of the Mid Bay. With nowhere easy to land, the long stretch of cliffs between Mount Wright and North Sandy Cove will feel uncomfortable for novices caught in a storm.</p>
<p><strong>Open water crossing at lower Muir Inlet:</strong> Between Point George and Garforth, the ebbing tide climbs a steep 700-foot seabed rise while simultaneously constricting from the sides. When mixed with the massive influx of water sloshing outward from Adams Inlet, turbulence and choppy waves are the norm. At slack water, intermediates should be fine. Never plan a crossing on the day of a daily tour boat pickup -- this leads to poor decision making in bad conditions.</p>
<p><strong>No camping between Garforth Island and North Sandy Cove:</strong> There is one -- and only one -- decent campsite to the south (22.1), just before North Sandy. Plan on nothing in between and budget paddling time accordingly.</p>
<p><strong>No reliable fresh water:</strong> Despite assurances on charts and maps, no perennial streams reach the ocean in this area. Fill up in advance at either the north end of North Sandy Cove or at the fast-flowing river near the entrance to Adams Inlet, just past Muir Point.</p>
<p><strong>Mount Wright drop-off beach -- rockslide danger:</strong> The scenic Mount Wright drop-off beach (22.3) has significant rockslide potential. In 2016, a very large slide started high on Mount Wright and reached the ocean. The Park Service requests you choose another location when this beach is a pickup/drop-off.</p>
<p><strong>Garforth Island southern tip hazards:</strong> Barely room above spring tide -- check the tide table and use the Rule of 12ths before committing. Sensitive bird habitat with ground-nesting oystercatchers; tread lightly.</p>
<p><strong>Finding the tour boat pickup:</strong> Look for the giant, can't-be-missed cairn; a pleasant gray shingle/cobble beach directly east from Garforth's southern tip; big talus slides pouring down from Mount Wright. When approaching from the north, the beach is hidden around a corner. Ignore smaller artistic cairns near but not on the correct beach. Exact coordinates: 58 deg 47'5.539" N, 136 deg 3'0.518" W.</p>`
},

  coords: [[58.828,-136.062],[58.838,-136.030],[58.848,-136.000],[58.855,-135.965],[58.860,-135.930],[58.862,-135.895],[58.868,-135.860],[58.878,-135.828],[58.888,-135.810],[58.900,-135.818],[58.902,-135.845],[58.898,-135.875],[58.892,-135.910],[58.885,-135.945],[58.878,-135.978],[58.872,-136.005],[58.868,-136.035],[58.865,-136.058],[58.855,-136.065],[58.840,-136.065]],
  distance: '9 nmi (10 mi, 16 km)',
  traverse: '2 hours (spring tide) to 3.5 hours (neap tide)',
  hiking: "Relationship destroying — don't bother except along the beaches and outwash plain",
  summary: `Birders rejoice -- this is your homeland. Vast flocks of scoters, mergansers, loons, harlequins, murrelets, geese, buffleheads, eagles, gulls, terns, cormorants, hummingbirds, grouse, oystercatchers, phalaropes, herons, ravens, crows, kingfishers, mallards, woodpeckers, juncos, and warblers practically carpet the water. Hanging glaciers spill over the Beartracks, and the ridiculously snow-clad Takhinsha Mountains give the inlet an otherworldly quality with dazzling pink alpenglow at sunset. Most nights this wilderness inlet is all yours -- not another human soul for a hundred square miles. But the campsites are grim, the goose poop is everywhere, and the tidal muck is the worst you have ever seen. A big deep bulb at the back fills and empties through a channel so shallow it functions like a half-mile-wide whitewater river. Only confident and skilled kayakers should enter. By law, Adams Inlet has no motorized vessels May 1 through September 15. High-tide-only entrances and exits mean overnight visits consume a sizable chunk of your vacation -- enter at 2:00 pm and your next practical exit is roughly 25 hours later.`,
  history: `<p><strong>A brief existence:</strong> Adams Inlet settled into its present form only in 1962 after the Adams Glacier retreated. USGS geologists in the late 1960s discovered copper, cadmium, nickel, zinc, and silver near the White Glacier, plus a mysterious chunk of coal.</p>
<p><strong>Reid and naming:</strong> Reid named Adams Glacier in 1890 after a field assistant. The Huna Tlingit called Adams Inlet Heen Xook Geeyi -- Dry Stream Bay.</p>
<p><strong>Muir's cruel trick on Harriman:</strong> On the 1899 Harriman Expedition, Muir advised Edward Harriman that Howling Valley had abundant brown bear. In an epic practical joke, Muir purposefully misdirected the party, who spent 24 exhausting hours fruitlessly searching. Harriman did not satisfy his bloodlust until Kodiak Island, 800+ miles later. In Muir's opinion, all animals had immortal souls. Despite the prank, the two became good friends. Muir knew from his 1890 traverse over Snow Dome that these icy reaches had no bears.</p>
<p><strong>Maps and charts unreliable:</strong> All maps, charts, and bathymetry of Adams Inlet represent nothing but "lies, horrific lies, and abominable inaccuracies." Neither the 2024 NOAA chart nor the 2019 Trails Illustrated represents reality. The Casement Glacier, Adams Glacier, and Main Valley rivers dump so much silt that small new features form overnight and entire channels fill in a few years. Rapid post-glacial rebound aggravates this. The 2024 NOAA chart shows a giant island that no longer exists; the 2019 Trails Illustrated claims miles of land where there is fine paddling. A NOAA "Note" admits a possible 7-foot average error in soundings, but silt and rebound generate far bigger errors. Within 50 years, the inlet could become a big lake with a tidal river emptying into Muir Inlet. Treat all descriptions as reference points and ask the VIS for current conditions.</p>`,
  naturalHistory: `<p><strong>Suck muck -- the science:</strong> In 1879, Muir described the glacial mud: "The gray mineral mud... kept unstable by the tides, at once took us in, swallowing our feet foremost with becoming glacial deliberation." The muck is ultra-fine glacier flour. Known as a "shear-jamming" substance, it lives between solid and liquid -- punch it and it jams hard as rock; push gently and you sink to the elbow. To escape: move very slowly so pressure stays low.</p>
<p><strong>Kinematic waves:</strong> Standing waves in the shallows slowly shift upstream against the current -- "backward propagating kinematic waves." Examples include washboard on dirt roads and ski moguls that migrate uphill.</p>
<p><strong>U-shaped vs V-shaped valleys:</strong> From near the Adams Glacier alluvial fan, look east to the valley between Snow Dome and Mount Elder -- a classic glacier-carved U-shape. In contrast, look at the Girdled Glacier outlet on Berg Mountain -- a distinct V-shape indicating river erosion rather than glacier grinding.</p>
<p><strong>Swamp donkeys (moose):</strong> When moose invaded Glacier Bay in the 1960s, Adams Inlet was ground zero. They need 10,000 to 20,000+ calories of vegetation per day, mostly from willow grabbed with their prehensile upper lip. They can browse underwater and swallow without raising their heads -- a trick no other New World deer can manage. Moose use a "predator swamping" strategy -- all calves arrive simultaneously in late May/early June. Moose kill far more people in Alaska than bears. If one wanders through camp, drop everything, walk away, give room. Watch for hackles rising and ears going back. Charges are usually bluffs -- stand behind a tree.</p>`,
  dangers: `<p><strong>Extreme tidal exchange:</strong> Massive volumes of water flood and drain through a channel so shallow it functions like a half-mile-wide whitewater river. Start paddling about 1.5 hours before high tide. At peak flood and ebb, the current is an inexorable bullet-train express. Paddling against the ebbing tide is impossible.</p>
<p><strong>Neap vs spring tide strategies:</strong> At neap tide, the current is gentler but slower, making it difficult to reach the inner bulbs before the tide turns. At spring tide, the tremendous current does the work, but you need advanced skills to avoid eddies and whirlpools that can depress the surface two or more feet.</p>
<p><strong>Rocks, shoals, and standing waves:</strong> The sneakiest rock (58 deg 52'42" N, 135 deg 54'2" W) sits mid-channel near the Adams Glacier outwash fan -- at peak flood/ebb, this rock generates whitewater.</p>
<p><strong>Suck muck:</strong> Getting stuck is entirely possible -- moose have died this way. The muck here is thicker than anywhere else in Glacier Bay.</p>
<p><strong>No passage:</strong> Do not attempt the nonexistent passage north of the large "island" on the 2024 NOAA chart. This channel has filled with silt.</p>
<p><strong>Caveat emptor:</strong> The 2024 US Coast Pilot warns Adams Inlet is "dangerous to enter without local knowledge." Ask the VIS for current information.</p>
<p><strong>Quick-entry day trip option:</strong> Enter 1.5 hours before high tide and exit no later than 1.5 hours after. Bring a tent and sleeping bag because any mistake means a night in the inlet.</p>`
},

  coords: [[58.867,-136.050],[58.876,-136.055],[58.890,-136.050],[58.905,-136.048],[58.920,-136.050],[58.935,-136.055],[58.950,-136.075],[58.960,-136.095],[58.960,-136.138],[58.945,-136.130],[58.930,-136.122],[58.915,-136.116],[58.900,-136.108],[58.885,-136.100],[58.870,-136.092]],
  distance: '6.5 nmi (7.5 mi, 12 km)',
  traverse: '3 hours',
  hiking: 'Relationship destroying — don\'t bother except along beaches',
  summary: `Six miles of winding coast with abundant wildlife and pleasant camping on raised beaches backed by aromatic black cottonwoods -- "one of the sweetest fragrances in the world." Crush a leaf or bud to savor the sap's perfume and place one on your pillow. Despite the steady stream of kayaks headed to glaciers, few stop here. By evening, wolves, brown bears, and moose are common rewards. The incredibly tranquil waters of Muir Inlet become progressively calmer northward. During slack tides on windless days, the water transforms into a flawless mirror perfectly reflecting Black Mountain and Riggs Glacier. "Lift a paddle and glide for a moment marveling how the kayak's bow folds beautiful wrinkles into this infinite smooth plane." Goose Cove, one of the most protected locations along lower Muir Inlet, makes an excellent shelter, though its Tlingit name Ooxjaa Geeyi -- "Windy Bay" -- dates to an era when katabatic winds were common.`,
  history: `<p><strong>Otto Klotz:</strong> Canadian surveyor who In 1941, glaciologist William "Bill" Field named the Klotz Hills for intrepid Canadian surveyor Otto Julius Klotz, who stood near these knobs in 1907 using novel photographic surveying techniques to help establish the Alaskan-Canadian boundary. Klotz refined repeat photography for documenting glacier advance and retreat -- now called "repeat photogrammetry," used worldwide by modern glaciologists.</p>
<p><strong>The Dumplings and The Mouse:</strong> Use the original 1880s steamship tourists' name "The Mouse" for the highest of the Klotz Hills. According to Eliza Scidmore (1891), one of Reid's surveying cairns sat atop the knob where tourists would summit and leave notes in tins. The Adams Glacier spanned Adams Inlet with little active flow, so tourists made the flat four-mile trek across the ice from Muir Point. Less fit tourists scrambled up one of the easier "Dumplings." Now buried in alder, they are quite difficult to climb.</p>
<p><strong>The maps suck:</strong> If hiking east into the Forest Creek flats, do not rely on any maps. Most lakes have evolved, filled in, drained, or vanished. The "very large lake" on the 2019 Trails Illustrated map northeast of Klotz Hills does not exist -- it is a 50-foot-tall tree-covered knoll. Some lakes have magically appeared where none are mapped.</p>`,
  naturalHistory: `<p><strong>Tidewater calving instability:</strong> At Muir's 1880 visit, the glacier had been withdrawing for over a century, but it stalled near Muir Point on shallower ground. In 1899, a magnitude-8.2 earthquake triggered "tidewater calving instability" -- deeper water means faster calving. The Muir retreated eight miles in eight years at 14 feet per day, shedding the Carroll, McBride, Riggs, and Morse Glaciers.</p>
<p><strong>The seemingly daft "Forest" Creek:</strong> In 1947, when named, Forest Creek had no trees -- only ancient lopped-off trunks of an "interstadial forest." More than 800 years earlier, living trees were buried by outwash then mowed over by advancing ice, leaving an eerie forest of dead trunks. Dense alder and cottonwood now conceal most stumps near shore. Relics poke through the Casement Glacier outwash plain. All stumps are hemlocks and spruce -- this area was once mature old-growth forest.</p>`,
  dangers: `<p><strong>Mapping errors:</strong> Most lakes, rivers, and streams shown on maps do not exist or have moved. The "very large lake" on the 2019 Trails Illustrated map northeast of Klotz Hills is actually a 50-foot tree-covered knoll. Mapped rivers on the Casement Glacier outwash plain are rarely where marked.</p>
<p><strong>Barrier islands flood:</strong> Several "barrier islands" have temptingly flat perches but average tides and storm waves swamp them. Due to immersion potential, masters of the Rule of 12ths only.</p>
<p><strong>No reliable freshwater:</strong> Forest Creek's brackish pools do not inspire confidence. A stream south of Klotz Hills is reliable but slippery with blue-green algae. Most other mapped streams do not exist.</p>
<p><strong>Mussel shells at Klotz Hills:</strong> Three-foot-deep piles of sharp mussel shells coat every tent site in the first cove north of Klotz Hills.</p>
<p><strong>Goose Cove rebound:</strong> The entrance is very narrow at low tides and steadily rising. Camp south to avoid getting stuck.</p>
<p><strong>Crossing Muir Inlet:</strong> Gets progressively easier the further north you travel. The Goose Cove area is an excellent choice.</p>`
},
